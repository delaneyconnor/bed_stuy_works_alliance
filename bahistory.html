<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BA History — Bed-Stuy Works Alliance</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            overflow: hidden;
            font-family: 'IBM Plex Mono', monospace;
            background: #0a0a0a;
        }

        /* ── Map ── */
        #map {
            position: absolute;
            inset: 0;
            bottom: 88px;
        }

        /* ── Detail panel ── */
        #detail {
            position: absolute;
            top: 16px;
            right: -420px;
            width: 380px;
            max-height: calc(100% - 104px);
            background: #fff;
            color: #000;
            z-index: 1000;
            overflow-y: auto;
            transition: right 0.35s cubic-bezier(0.16, 1, 0.3, 1);
            scrollbar-width: thin;
        }

        #detail.open { right: 16px; }

        .d-strap {
            height: 4px;
            width: 100%;
            flex-shrink: 0;
        }

        .d-inner {
            padding: 18px 20px 22px;
        }

        .d-top {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 14px;
        }

        .d-badge {
            font-size: 8px;
            font-weight: 600;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: #fff;
            padding: 4px 9px;
            flex-shrink: 0;
        }

        .d-close {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            color: #bbb;
            font-family: inherit;
            line-height: 1;
            flex-shrink: 0;
            margin-left: 8px;
            padding: 2px;
        }
        .d-close:hover { color: #000; }

        .d-year {
            font-size: 10px;
            color: #aaa;
            letter-spacing: 0.06em;
            margin-bottom: 5px;
        }

        .d-title {
            font-size: 17px;
            font-weight: 600;
            line-height: 1.3;
            margin-bottom: 6px;
            color: #000;
        }

        .d-subtitle {
            font-size: 11px;
            color: #777;
            line-height: 1.55;
            margin-bottom: 14px;
            font-style: italic;
        }

        .d-divider {
            height: 1px;
            background: #f0f0f0;
            margin-bottom: 14px;
        }

        .d-body {
            font-size: 12px;
            line-height: 1.8;
            color: #333;
            font-weight: 300;
            margin-bottom: 18px;
        }

        .d-citation {
            font-size: 10px;
            color: #aaa;
            line-height: 1.5;
            margin-bottom: 14px;
            font-style: italic;
        }

        .d-sources {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .source-btn {
            display: block;
            font-family: inherit;
            font-size: 9px;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            text-decoration: none;
            color: #000;
            border: 1.5px solid #000;
            padding: 7px 12px;
            text-align: center;
            transition: background 0.15s, color 0.15s;
        }
        .source-btn:hover { background: #000; color: #fff; }

        .preview-toggle {
            font-family: inherit;
            font-size: 9px;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
            color: #999;
            background: none;
            border: 1.5px solid #e0e0e0;
            padding: 7px 12px;
            width: 100%;
            transition: border-color 0.15s, color 0.15s;
        }
        .preview-toggle:hover { border-color: #000; color: #000; }

        .preview-wrap {
            display: none;
            margin-top: 6px;
        }
        .preview-wrap.open { display: block; }
        .preview-wrap iframe {
            width: 100%;
            height: 280px;
            border: 1px solid #e0e0e0;
            display: block;
        }

        /* ── Legend ── */
        #legend {
            position: absolute;
            bottom: 104px;
            left: 12px;
            z-index: 999;
            background: rgba(255,255,255,0.92);
            padding: 10px 12px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .leg-item {
            display: flex;
            align-items: center;
            gap: 7px;
            font-size: 9px;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: #000;
        }

        .leg-dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            flex-shrink: 0;
            border: 1.5px solid rgba(255,255,255,0.6);
        }

        /* ── Time bar ── */
        #timebar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 88px;
            display: flex;
            background: #0a0a0a;
            z-index: 1000;
            border-top: 1px solid #222;
        }

        .era-seg {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-right: 1px solid #1a1a1a;
            padding: 0 6px;
            text-align: center;
            transition: background 0.2s;
            position: relative;
            overflow: hidden;
        }
        .era-seg:last-child { border-right: none; }
        .era-seg:hover { background: #111; }

        .era-seg.active {
            background: #fff;
        }
        .era-seg.active .era-range { color: #aaa; }
        .era-seg.active .era-label { color: #000; }
        .era-seg.active .era-count { color: #888; }

        .era-accent {
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
        }

        .era-range {
            font-size: 8px;
            color: #555;
            letter-spacing: 0.04em;
            margin-bottom: 3px;
            margin-top: 6px;
        }

        .era-label {
            font-size: 9px;
            font-weight: 600;
            color: #ccc;
            letter-spacing: 0.06em;
            line-height: 1.35;
            text-transform: uppercase;
        }

        .era-count {
            font-size: 8px;
            color: #444;
            margin-top: 3px;
        }

        /* Leaflet overrides */
        .leaflet-tooltip {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px;
            font-weight: 600;
            background: #000;
            color: #fff;
            border: none;
            border-radius: 0;
            padding: 5px 9px;
            box-shadow: none;
            letter-spacing: 0.02em;
        }
        .leaflet-tooltip::before { display: none; }

        .leaflet-control-zoom a {
            font-family: 'IBM Plex Mono', monospace;
        }

        /* No-source note */
        .no-source {
            font-size: 10px;
            color: #ccc;
            font-style: italic;
        }

        /* Era label on map */
        .era-overlay {
            position: absolute;
            top: 16px;
            left: 16px;
            z-index: 998;
            pointer-events: none;
        }

        .era-overlay-text {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #fff;
            background: rgba(0,0,0,0.75);
            padding: 6px 12px;
            display: inline-block;
        }

        .era-overlay-count {
            font-size: 9px;
            color: rgba(255,255,255,0.5);
            background: rgba(0,0,0,0.75);
            padding: 4px 12px 6px;
            display: block;
            margin-top: 1px;
        }
    </style>
</head>
<body>

<div id="map"></div>

<!-- Current era overlay -->
<div class="era-overlay">
    <div class="era-overlay-text" id="overlay-era">—</div>
    <div class="era-overlay-count" id="overlay-count">0 events</div>
</div>

<!-- Legend -->
<div id="legend"></div>

<!-- Detail panel -->
<div id="detail">
    <div class="d-strap" id="d-strap"></div>
    <div class="d-inner">
        <div class="d-top">
            <div class="d-badge" id="d-badge"></div>
            <button class="d-close" id="d-close">×</button>
        </div>
        <div class="d-year" id="d-year"></div>
        <div class="d-title" id="d-title"></div>
        <div class="d-subtitle" id="d-subtitle"></div>
        <div class="d-divider"></div>
        <div class="d-body" id="d-body"></div>
        <div class="d-citation" id="d-citation"></div>
        <div class="d-sources" id="d-sources"></div>
    </div>
</div>

<!-- Time bar -->
<div id="timebar"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
/* ── Config ── */
const TYPE_COLORS = {
    Organizing:     '#000000',
    Policy:         '#3a5ea8',
    Demographic:    '#888888',
    Cultural:       '#7a4e9e',
    Infrastructure: '#2a7a4a',
    Crisis:         '#cc0000',
    Displacement:   '#e05500'
};

const ERAS = [
    { range: 'pre-1890',    label: 'Preconditions',    test: s => s.startsWith('Pre'),  accent: '#7a4e9e' },
    { range: '1890–1930',   label: 'Form Emerges',     test: s => s.startsWith('1890'), accent: '#3a5ea8' },
    { range: '1930–1960',   label: 'Racial Transition',test: s => s.startsWith('1930'), accent: '#cc0000' },
    { range: '1960–1980',   label: 'Self-Determination',test:s => s.startsWith('1960'), accent: '#2a7a4a' },
    { range: '1980–2000',   label: 'Crisis',           test: s => s.startsWith('1980'), accent: '#e05500' },
    { range: '2000–present',label: 'Gentrification Era',test:s => s.startsWith('2000'), accent: '#888888' }
];

/* ── Map init ── */
const map = L.map('map', {
    center: [40.687, -73.942],
    zoom: 14,
    zoomControl: true,
    attributionControl: false
});

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    maxZoom: 19,
    attribution: '© CartoDB'
}).addTo(map);

/* ── Jitter overlapping coordinates ── */
function jitter(all) {
    const groups = {};
    all.forEach(ev => {
        const k = `${ev.lat.toFixed(3)},${ev.lng.toFixed(3)}`;
        (groups[k] = groups[k] || []).push(ev);
    });
    all.forEach(ev => {
        const k = `${ev.lat.toFixed(3)},${ev.lng.toFixed(3)}`;
        const g = groups[k];
        if (g.length === 1) {
            ev._lat = ev.lat; ev._lng = ev.lng;
        } else {
            const idx = g.indexOf(ev);
            const angle = (2 * Math.PI * idx) / g.length;
            const r = 0.0014;
            ev._lat = ev.lat + r * Math.sin(angle);
            ev._lng = ev.lng + r * Math.cos(angle);
        }
    });
}

/* ── Markers ── */
let activeMarkers = [], activeEraIdx = -1;

function clearMarkers() {
    activeMarkers.forEach(m => map.removeLayer(m));
    activeMarkers = [];
}

function loadEra(idx) {
    if (idx === activeEraIdx) return;
    activeEraIdx = idx;
    clearMarkers();

    // Update time bar
    document.querySelectorAll('.era-seg').forEach((el, i) => {
        el.classList.toggle('active', i === idx);
    });

    // Update overlay
    const era = ERAS[idx];
    const filtered = allEvents.filter(ev => era.test(ev.era));
    document.getElementById('overlay-era').textContent = era.range + ' · ' + era.label;
    document.getElementById('overlay-count').textContent = filtered.length + ' event' + (filtered.length !== 1 ? 's' : '');

    // Close detail
    document.getElementById('detail').classList.remove('open');

    // Draw markers
    filtered.forEach(ev => {
        const col = TYPE_COLORS[ev.type] || '#888';
        const m = L.circleMarker([ev._lat, ev._lng], {
            radius: 9,
            fillColor: col,
            color: col === '#000000' ? '#fff' : '#fff',
            weight: 2,
            fillOpacity: 0.92
        });

        m.bindTooltip(ev.title, {
            direction: 'top',
            offset: [0, -12],
            sticky: false
        });

        m.on('click', () => {
            showDetail(ev, col);
            m.closeTooltip();
        });

        m.addTo(map);
        activeMarkers.push(m);
    });

    // Fly to fit
    if (activeMarkers.length > 0) {
        const lls = activeMarkers.map(m => m.getLatLng());
        if (lls.length === 1) {
            map.flyTo(lls[0], 15, { duration: 0.9 });
        } else {
            map.flyToBounds(L.latLngBounds(lls).pad(0.25), { duration: 0.9, maxZoom: 15 });
        }
    }
}

/* ── Detail panel ── */
function showDetail(ev, col) {
    document.getElementById('d-strap').style.background = col;
    document.getElementById('d-badge').textContent = ev.type;
    document.getElementById('d-badge').style.background = col;
    document.getElementById('d-year').textContent = ev.date;
    document.getElementById('d-title').textContent = ev.title;
    document.getElementById('d-subtitle').textContent = ev.subtitle || '';
    document.getElementById('d-body').textContent = ev.body;
    document.getElementById('d-citation').textContent = ev.citation ? 'Source: ' + ev.citation : '';

    const sourcesEl = document.getElementById('d-sources');
    sourcesEl.innerHTML = buildSources(ev.source_url);

    document.getElementById('detail').classList.add('open');
}

function buildSources(raw) {
    if (!raw) return '<div class="no-source">No linked source</div>';

    const urls = raw.split(/\s*\|\s*/).filter(Boolean);
    let html = '';

    urls.forEach((url, i) => {
        const label = urls.length > 1 ? `Read Source ${i + 1} ↗` : 'Read Source ↗';
        const isPDF = url.toLowerCase().includes('.pdf');
        const isOpen = isPDF
            || url.includes('ourstuyheights')
            || url.includes('nypl.org')
            || url.includes('citizensnyc.org')
            || url.includes('communityprofiles.planning');

        html += `<a href="${escHtml(url)}" target="_blank" rel="noopener" class="source-btn">${label}</a>`;

        if (isOpen) {
            const pid = 'prev-' + i + '-' + Date.now();
            html += `<button class="preview-toggle" onclick="togglePreview('${pid}')">Preview in panel ▾</button>
                <div class="preview-wrap" id="${pid}">
                    <iframe src="${escHtml(url)}" loading="lazy" sandbox="allow-scripts allow-same-origin allow-forms" title="Source preview"></iframe>
                </div>`;
        }
    });

    return html;
}

function togglePreview(id) {
    const el = document.getElementById(id);
    const btn = el.previousElementSibling;
    const open = el.classList.toggle('open');
    btn.textContent = open ? 'Preview in panel ▴' : 'Preview in panel ▾';
}

function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

document.getElementById('d-close').addEventListener('click', () => {
    document.getElementById('detail').classList.remove('open');
});

/* ── Legend ── */
function buildLegend() {
    const el = document.getElementById('legend');
    Object.entries(TYPE_COLORS).forEach(([type, col]) => {
        const row = document.createElement('div');
        row.className = 'leg-item';
        row.innerHTML = `<div class="leg-dot" style="background:${col}"></div><span>${type}</span>`;
        el.appendChild(row);
    });
}

/* ── Time bar ── */
function buildTimebar(events) {
    const tb = document.getElementById('timebar');
    ERAS.forEach((era, i) => {
        const count = events.filter(ev => era.test(ev.era)).length;
        const seg = document.createElement('div');
        seg.className = 'era-seg';
        seg.innerHTML = `
            <div class="era-accent" style="background:${era.accent}"></div>
            <div class="era-range">${era.range}</div>
            <div class="era-label">${era.label}</div>
            <div class="era-count">${count} events</div>`;
        seg.addEventListener('click', () => loadEra(i));
        tb.appendChild(seg);
    });
}

/* ── Boot ── */
let allEvents = [];

fetch('data/ba_timeline.json')
    .then(r => r.json())
    .then(data => {
        allEvents = data;
        jitter(allEvents);
        buildLegend();
        buildTimebar(allEvents);
        loadEra(0);
    })
    .catch(err => console.error('Failed to load timeline data:', err));
</script>
</body>
</html>
