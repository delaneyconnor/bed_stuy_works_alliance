<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BA History — Bed-Stuy Works Alliance</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body { height: 100%; overflow: hidden; font-family: 'IBM Plex Mono', monospace; background: #0a0a0a; }

        /* ── Map ── */
        #map { position: absolute; inset: 0; bottom: 96px; }

        /* ── Legend ── */
        #legend {
            position: absolute;
            top: 12px; left: 12px;
            z-index: 999;
            background: rgba(10,10,10,0.85);
            padding: 10px 14px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            pointer-events: none;
        }
        .leg-row { display: flex; align-items: center; gap: 8px; }
        .leg-dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            border: 1.5px solid rgba(255,255,255,0.25);
            flex-shrink: 0;
        }
        .leg-label { font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; color: #ccc; }

        /* ── Basemap badge ── */
        #basemap-label {
            position: absolute;
            bottom: 108px; right: 12px;
            z-index: 999;
            font-size: 9px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #aaa;
            background: rgba(10,10,10,0.8);
            padding: 4px 8px;
            pointer-events: none;
        }

        /* ── Detail panel ── */
        #detail {
            position: absolute;
            top: 12px; right: -400px;
            width: 360px;
            max-height: calc(100% - 120px);
            background: #fff;
            color: #000;
            z-index: 1000;
            overflow-y: auto;
            transition: right 0.35s cubic-bezier(0.16, 1, 0.3, 1);
            scrollbar-width: thin;
        }
        #detail.open { right: 12px; }

        .d-accent { height: 4px; width: 100%; }

        .d-body-wrap { padding: 18px 20px 24px; }

        .d-top-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .d-badge {
            font-size: 8px;
            font-weight: 600;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: #fff;
            padding: 4px 8px;
            flex-shrink: 0;
        }

        .d-close {
            background: none; border: none;
            font-size: 18px; cursor: pointer;
            color: #ccc; font-family: inherit;
            line-height: 1; padding: 2px;
        }
        .d-close:hover { color: #000; }

        .d-year   { font-size: 10px; color: #aaa; letter-spacing: 0.06em; margin-bottom: 4px; }
        .d-title  { font-size: 16px; font-weight: 600; line-height: 1.3; margin-bottom: 5px; }
        .d-sub    { font-size: 11px; color: #777; line-height: 1.5; font-style: italic; margin-bottom: 14px; }
        .d-rule   { height: 1px; background: #f0f0f0; margin-bottom: 14px; }
        .d-text   { font-size: 12px; line-height: 1.8; color: #333; font-weight: 300; margin-bottom: 16px; }
        .d-cite   { font-size: 10px; color: #bbb; font-style: italic; margin-bottom: 14px; line-height: 1.5; }

        .d-sources { display: flex; flex-direction: column; gap: 6px; }

        .src-btn {
            display: block;
            font-family: inherit;
            font-size: 9px; font-weight: 600;
            letter-spacing: 0.1em; text-transform: uppercase;
            text-decoration: none;
            color: #000; border: 1.5px solid #000;
            padding: 7px 12px; text-align: center;
            transition: background 0.15s, color 0.15s;
        }
        .src-btn:hover { background: #000; color: #fff; }

        .preview-toggle {
            font-family: inherit;
            font-size: 9px; font-weight: 600;
            letter-spacing: 0.1em; text-transform: uppercase;
            cursor: pointer; color: #aaa;
            background: none; border: 1.5px solid #e0e0e0;
            padding: 7px 12px; width: 100%;
            transition: border-color 0.15s, color 0.15s;
        }
        .preview-toggle:hover { border-color: #000; color: #000; }

        .preview-wrap { display: none; margin-top: 6px; }
        .preview-wrap.open { display: block; }
        .preview-wrap iframe { width: 100%; height: 260px; border: 1px solid #e0e0e0; display: block; }

        /* ── Timebar ── */
        #timebar {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 96px;
            background: #0a0a0a;
            border-top: 1px solid #1e1e1e;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 24px;
            gap: 6px;
        }

        #tb-meta {
            display: flex;
            align-items: baseline;
            gap: 14px;
        }

        #tb-year {
            font-size: 24px;
            font-weight: 600;
            color: #fff;
            letter-spacing: 0.02em;
            min-width: 56px;
            line-height: 1;
        }

        #tb-era {
            font-size: 9px;
            color: #666;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        #tb-count {
            font-size: 9px;
            color: #444;
            letter-spacing: 0.06em;
            margin-left: auto;
        }

        /* Range slider */
        #slider-wrap { position: relative; }

        #slider {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 3px;
            outline: none;
            cursor: pointer;
            border-radius: 0;
            /* era color bands — positions calculated as % of 1600→2026 (426yr span) */
            background: linear-gradient(to right,
                #7a4e9e 0%,      #7a4e9e 68.1%,   /* Pre-1890 */
                #2857a4 68.1%,   #2857a4 77.5%,   /* 1890-1930 */
                #b52222 77.5%,   #b52222 84.5%,   /* 1930-1960 */
                #111111 84.5%,   #111111 89.2%,   /* 1960-1980 */
                #c85000 89.2%,   #c85000 93.9%,   /* 1980-2000 */
                #777777 93.9%,   #777777 100%     /* 2000-present */
            );
        }
        #slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px; height: 16px;
            border-radius: 50%;
            background: #fff;
            cursor: pointer;
            box-shadow: 0 0 0 3px rgba(255,255,255,0.15);
        }
        #slider::-moz-range-thumb {
            width: 16px; height: 16px;
            border-radius: 50%;
            background: #fff;
            border: none;
            cursor: pointer;
        }

        #tb-ticks {
            position: relative;
            height: 14px;
            pointer-events: none;
        }
        .t-label {
            position: absolute;
            font-size: 8px;
            color: #444;
            letter-spacing: 0.03em;
            transform: translateX(-50%);
            white-space: nowrap;
        }
        .t-label:first-child { transform: translateX(0); }
        .t-label:last-child  { transform: translateX(-100%); }

        /* Leaflet overrides */
        .leaflet-tooltip {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px;
            font-weight: 600;
            background: rgba(0,0,0,0.85);
            color: #fff;
            border: none; border-radius: 0;
            padding: 5px 10px;
            box-shadow: none;
            max-width: 200px;
            white-space: normal;
            line-height: 1.4;
        }
        .leaflet-tooltip::before { display: none; }

        .leaflet-control-attribution { font-family: 'IBM Plex Mono', monospace; font-size: 9px; }
    </style>
</head>
<body>

<div id="map"></div>
<div id="legend"></div>
<div id="basemap-label">Modern map</div>

<!-- Detail panel -->
<div id="detail">
    <div class="d-accent" id="d-accent"></div>
    <div class="d-body-wrap">
        <div class="d-top-row">
            <div class="d-badge" id="d-badge"></div>
            <button class="d-close" id="d-close">×</button>
        </div>
        <div class="d-year"    id="d-year"></div>
        <div class="d-title"   id="d-title"></div>
        <div class="d-sub"     id="d-sub"></div>
        <div class="d-rule"></div>
        <div class="d-text"    id="d-text"></div>
        <div class="d-cite"    id="d-cite"></div>
        <div class="d-sources" id="d-sources"></div>
    </div>
</div>

<!-- Timebar -->
<div id="timebar">
    <div id="tb-meta">
        <div id="tb-year">1600</div>
        <div id="tb-era">Pre-1890 · Preconditions</div>
        <div id="tb-count">0 events visible</div>
    </div>
    <div id="slider-wrap">
        <input type="range" id="slider" min="1600" max="2026" value="1600" step="1">
    </div>
    <div id="tb-ticks">
        <span class="t-label" style="left:0%">1600</span>
        <span class="t-label" style="left:68.1%">1890</span>
        <span class="t-label" style="left:77.5%">1930</span>
        <span class="t-label" style="left:84.5%">1960</span>
        <span class="t-label" style="left:89.2%">1980</span>
        <span class="t-label" style="left:93.9%">2000</span>
        <span class="t-label" style="left:100%">2026</span>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>

/* ══════════════════════════════════════════════
   TYPE SYSTEM
   Original JSON types → simplified 5-category narrative types
   ══════════════════════════════════════════════ */
const TYPE_MAP = {
    Organizing:     'Organizing',
    Policy:         'Government',
    Demographic:    'Migration',
    Cultural:       'Organizing',
    Infrastructure: 'Government',
    Crisis:         'Crisis',
    Displacement:   'Displacement'
};

// Event-specific overrides (id → new type)
const TYPE_OVERRIDES = {
    34: 'Organizing',   // 32,000 trained through Block Watchers → community capacity
    44: 'Displacement', // CB3 District Needs Statement → documents displacement
};

function resolveType(ev) {
    if (TYPE_OVERRIDES[ev.id]) return TYPE_OVERRIDES[ev.id];
    return TYPE_MAP[ev.type] || ev.type;
}

const TYPE_COLORS = {
    Organizing:   '#111111',
    Government:   '#2857a4',
    Migration:    '#7a4e9e',
    Crisis:       '#c42b2b',
    Displacement: '#c85000'
};

const TYPE_DESCS = {
    Organizing:   'Community-led organizing',
    Government:   'State & municipal action',
    Migration:    'Demographic movement',
    Crisis:       'Social or economic crisis',
    Displacement: 'Forced removal & loss'
};

/* ══════════════════════════════════════════════
   ERAS
   ══════════════════════════════════════════════ */
const ERAS = [
    { name: 'Preconditions',       range: 'Pre-1890',    start: 0,    end: 1889, accent: '#7a4e9e' },
    { name: 'Form Emerges',        range: '1890–1930',   start: 1890, end: 1929, accent: '#2857a4' },
    { name: 'Racial Transition',   range: '1930–1960',   start: 1930, end: 1959, accent: '#c42b2b' },
    { name: 'Self-Determination',  range: '1960–1980',   start: 1960, end: 1979, accent: '#111111' },
    { name: 'Crisis & Retrenchment', range: '1980–2000', start: 1980, end: 1999, accent: '#c85000' },
    { name: 'Gentrification Era',  range: '2000–present',start: 2000, end: 9999, accent: '#777777' }
];

function eraForYear(y) {
    return ERAS.find(e => y >= e.start && y <= e.end) || ERAS[0];
}

/* ══════════════════════════════════════════════
   BASEMAPS  — NYC aerial photography + CartoDB
   ══════════════════════════════════════════════ */
const CARTO_LIGHT = 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png';
const NYC_1924    = 'https://maps.nyc.gov/xyz/1.0.0/photo/1924/{z}/{x}/{y}.png8';
const NYC_1951    = 'https://maps.nyc.gov/xyz/1.0.0/photo/1951/{z}/{x}/{y}.png8';
const NYC_1996    = 'https://maps.nyc.gov/xyz/1.0.0/photo/1996/{z}/{x}/{y}.png8';

const BASEMAP_SCHEDULE = [
    { before: 1924, url: CARTO_LIGHT, label: 'Modern map',        attribution: '© CartoDB' },
    { before: 1952, url: NYC_1924,    label: '1924 aerial photo',  attribution: '© NYC DoITT' },
    { before: 1985, url: NYC_1951,    label: '1951 aerial photo',  attribution: '© NYC DoITT' },
    { before: 2000, url: NYC_1996,    label: '1996 aerial photo',  attribution: '© NYC DoITT' },
    { before: 9999, url: CARTO_LIGHT, label: 'Modern map',        attribution: '© CartoDB' }
];

function basemapForYear(y) {
    return BASEMAP_SCHEDULE.find(b => y < b.before);
}

/* ══════════════════════════════════════════════
   MAP INIT
   ══════════════════════════════════════════════ */
const map = L.map('map', {
    center: [40.685, -73.942],
    zoom: 13,
    zoomControl: true,
    attributionControl: true
});

let activeTileLayer = null;

function setBasemap(year) {
    const spec = basemapForYear(year);
    if (activeTileLayer && activeTileLayer._url === spec.url) return;
    if (activeTileLayer) map.removeLayer(activeTileLayer);
    activeTileLayer = L.tileLayer(spec.url, { maxZoom: 19, attribution: spec.attribution });
    activeTileLayer.addTo(map);
    activeTileLayer._url = spec.url;
    document.getElementById('basemap-label').textContent = spec.label;
}

setBasemap(1600); // initial

/* ══════════════════════════════════════════════
   JITTER — stable per-event offsets for shared coords
   ══════════════════════════════════════════════ */
function applyJitter(events) {
    const groups = {};
    events.forEach(ev => {
        const k = `${ev.lat.toFixed(3)},${ev.lng.toFixed(3)}`;
        (groups[k] = groups[k] || []).push(ev);
    });
    events.forEach(ev => {
        const k = `${ev.lat.toFixed(3)},${ev.lng.toFixed(3)}`;
        const g = groups[k];
        if (g.length === 1) { ev._lat = ev.lat; ev._lng = ev.lng; return; }
        const idx = g.indexOf(ev);
        const angle = (2 * Math.PI * idx) / g.length;
        const r = 0.0013;
        ev._lat = ev.lat + r * Math.sin(angle);
        ev._lng = ev.lng + r * Math.cos(angle);
    });
}

/* ══════════════════════════════════════════════
   MARKER MANAGEMENT — accumulative display
   ══════════════════════════════════════════════ */
const activeMarkers = new Map(); // id → L.circleMarker

function updateMarkers(currentYear, events) {
    events.forEach(ev => {
        const evYear = parseInt(ev.year, 10);
        const already = activeMarkers.has(ev.id);

        if (evYear <= currentYear && !already) {
            const type  = resolveType(ev);
            const color = TYPE_COLORS[type] || '#888';
            const m = L.circleMarker([ev._lat, ev._lng], {
                radius: 8,
                fillColor: color,
                color: '#fff',
                weight: 2,
                fillOpacity: 0.9
            });
            m.bindTooltip(`<span>${ev.title}</span>`, {
                direction: 'top', offset: [0, -10], sticky: false
            });
            m.on('click', () => showDetail(ev, color));
            m.addTo(map);
            activeMarkers.set(ev.id, m);

        } else if (evYear > currentYear && already) {
            map.removeLayer(activeMarkers.get(ev.id));
            activeMarkers.delete(ev.id);
            // close detail if it was for this event
            if (parseInt(document.getElementById('d-year').textContent, 10) === evYear
                && document.getElementById('d-title').textContent === ev.title) {
                document.getElementById('detail').classList.remove('open');
            }
        }
    });
}

/* ══════════════════════════════════════════════
   DETAIL PANEL
   ══════════════════════════════════════════════ */
function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;')
                    .replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function buildSources(raw) {
    if (!raw) return '<div style="font-size:10px;color:#ccc;font-style:italic">No linked source</div>';
    const urls = raw.split(/\s*\|\s*/).filter(Boolean);
    return urls.map((url, i) => {
        const label = urls.length > 1 ? `Read Source ${i+1} ↗` : 'Read Source ↗';
        const isEmbeddable = url.includes('.pdf')
            || url.includes('ourstuyheights')
            || url.includes('nypl.org')
            || url.includes('citizensnyc.org')
            || url.includes('communityprofiles.planning');

        let html = `<a href="${escHtml(url)}" target="_blank" rel="noopener" class="src-btn">${label}</a>`;
        if (isEmbeddable) {
            const pid = `pv-${ev.id}-${i}`;
            html += `<button class="preview-toggle" onclick="togglePreview('${pid}')">Preview in panel ▾</button>
                <div class="preview-wrap" id="${pid}">
                    <iframe src="${escHtml(url)}" loading="lazy" sandbox="allow-scripts allow-same-origin allow-forms"></iframe>
                </div>`;
        }
        return html;
    }).join('');
}

// buildSources uses ev in closure — refactor to pass ev explicitly
function buildSourcesFor(raw, evId) {
    if (!raw) return '<div style="font-size:10px;color:#ccc;font-style:italic">No linked source</div>';
    const urls = raw.split(/\s*\|\s*/).filter(Boolean);
    return urls.map((url, i) => {
        const label = urls.length > 1 ? `Read Source ${i+1} ↗` : 'Read Source ↗';
        const isEmbeddable = url.includes('.pdf')
            || url.includes('ourstuyheights')
            || url.includes('nypl.org')
            || url.includes('citizensnyc.org')
            || url.includes('communityprofiles.planning');

        const pid = `pv-${evId}-${i}`;
        let html = `<a href="${escHtml(url)}" target="_blank" rel="noopener" class="src-btn">${label}</a>`;
        if (isEmbeddable) {
            html += `<button class="preview-toggle" onclick="togglePreview('${pid}')">Preview in panel ▾</button>
                <div class="preview-wrap" id="${pid}">
                    <iframe src="${escHtml(url)}" loading="lazy" sandbox="allow-scripts allow-same-origin allow-forms"></iframe>
                </div>`;
        }
        return html;
    }).join('');
}

function togglePreview(id) {
    const el = document.getElementById(id);
    if (!el) return;
    const btn = el.previousElementSibling;
    const open = el.classList.toggle('open');
    btn.textContent = open ? 'Preview in panel ▴' : 'Preview in panel ▾';
}

function showDetail(ev, color) {
    document.getElementById('d-accent').style.background = color;
    document.getElementById('d-badge').textContent  = resolveType(ev);
    document.getElementById('d-badge').style.background = color;
    document.getElementById('d-year').textContent   = ev.date;
    document.getElementById('d-title').textContent  = ev.title;
    document.getElementById('d-sub').textContent    = ev.subtitle || '';
    document.getElementById('d-text').textContent   = ev.body;
    document.getElementById('d-cite').textContent   = ev.citation ? 'Source: ' + ev.citation : '';
    document.getElementById('d-sources').innerHTML  = buildSourcesFor(ev.source_url, ev.id);
    document.getElementById('detail').classList.add('open');
    map.flyTo([ev._lat, ev._lng], Math.max(map.getZoom(), 15), { duration: 0.7 });
}

document.getElementById('d-close').addEventListener('click', () => {
    document.getElementById('detail').classList.remove('open');
});

/* ══════════════════════════════════════════════
   LEGEND
   ══════════════════════════════════════════════ */
function buildLegend() {
    const el = document.getElementById('legend');
    Object.entries(TYPE_COLORS).forEach(([type, color]) => {
        const row = document.createElement('div');
        row.className = 'leg-row';
        row.innerHTML = `<div class="leg-dot" style="background:${color}"></div>
                         <span class="leg-label">${type}</span>`;
        el.appendChild(row);
    });
}

/* ══════════════════════════════════════════════
   SLIDER
   ══════════════════════════════════════════════ */
const slider   = document.getElementById('slider');
const elYear   = document.getElementById('tb-year');
const elEra    = document.getElementById('tb-era');
const elCount  = document.getElementById('tb-count');

let allEvents = [];

function onSlide() {
    const year = parseInt(slider.value, 10);
    const era  = eraForYear(year);
    elYear.textContent = year;
    elEra.textContent  = `${era.range} · ${era.name}`;

    updateMarkers(year, allEvents);
    elCount.textContent = `${activeMarkers.size} event${activeMarkers.size !== 1 ? 's' : ''} visible`;

    setBasemap(year);
}

slider.addEventListener('input', onSlide);

/* ══════════════════════════════════════════════
   BOOT
   ══════════════════════════════════════════════ */
fetch('data/ba_timeline.json')
    .then(r => r.json())
    .then(data => {
        allEvents = data;
        applyJitter(allEvents);
        buildLegend();
        // Start slider at first event year
        slider.value = 1600;
        onSlide();
    })
    .catch(err => console.error('Failed to load timeline:', err));

</script>
</body>
</html>
