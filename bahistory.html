<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BA History — Bed-Stuy Works Alliance</title>
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.0.1/mapbox-gl.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; font-family: 'IBM Plex Mono', monospace; background: #0a0a0a; }

        /* ── Root layout ── */
        #layout {
            display: flex;
            flex-direction: row;
            height: 100vh;
            width: 100vw;
            --split: 340px;
        }

        /* ── Filter panel ── */
        #filter-panel {
            width: var(--split);
            height: 100%;
            overflow-y: auto;
            overflow-x: hidden;
            background: #fff;
            flex-shrink: 0;
            scrollbar-width: thin;
            scrollbar-color: #e0e0e0 transparent;
            display: flex;
            flex-direction: column;
        }
        #fp-header {
            padding: 16px 16px 12px;
            flex-shrink: 0;
        }
        #fp-title {
            font-size: 22px;
            font-weight: 600;
            color: #000;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            display: block;
            line-height: 1.1;
        }
        #fp-sub {
            font-size: 10px;
            color: #888;
            letter-spacing: 0.04em;
            display: block;
            margin-top: 5px;
            font-style: italic;
        }
        .fp-section {
            padding: 14px 16px 12px;
            border-bottom: 1px solid #f0f0f0;
        }
        .fp-section-label {
            font-size: 9px;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #aaa;
            margin-bottom: 10px;
        }
        .fp-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }
        .fp-chip {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 9px;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            padding: 5px 9px;
            border: 1.5px solid #ddd;
            background: #fff;
            color: #bbb;
            cursor: pointer;
            transition: border-color 0.12s, color 0.12s, background 0.12s;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .fp-chip.active {
            border-color: #111;
            color: #111;
        }
        .fp-chip:hover { border-color: #555; color: #555; }
        .chip-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            flex-shrink: 0;
            opacity: 0.4;
        }
        .fp-chip.active .chip-dot { opacity: 1; }

        /* Year range slider */
        .year-range-wrap {
            padding: 4px 0 2px;
        }
        .year-range-labels {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            font-weight: 600;
            color: #333;
            letter-spacing: 0.04em;
            margin-bottom: 10px;
        }
        .dual-slider {
            position: relative;
            height: 20px;
            margin: 0 6px;
        }
        .dual-slider-bg {
            position: absolute;
            top: 50%;
            left: 0; right: 0;
            transform: translateY(-50%);
            height: 2px;
            background: #e0e0e0;
            border-radius: 2px;
            pointer-events: none;
        }
        .dual-slider-fill {
            position: absolute;
            height: 100%;
            background: #111;
            border-radius: 2px;
            top: 0;
            pointer-events: none;
        }
        .dual-slider input[type=range] {
            position: absolute;
            width: calc(100% + 12px);
            left: -6px;
            top: 50%;
            transform: translateY(-50%);
            height: 2px;
            background: transparent;
            -webkit-appearance: none;
            appearance: none;
            pointer-events: none;
            margin: 0;
        }
        .dual-slider input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            pointer-events: all;
            width: 14px; height: 14px;
            border-radius: 50%;
            background: #111;
            cursor: pointer;
            box-shadow: 0 0 0 2px #fff, 0 0 0 3px #ccc;
        }
        .dual-slider input[type=range]::-moz-range-thumb {
            pointer-events: all;
            width: 10px; height: 10px;
            border-radius: 50%;
            background: #111;
            cursor: pointer;
            border: 2px solid #fff;
            box-shadow: 0 0 0 1px #ccc;
        }
        .dual-slider input[type=range]::-webkit-slider-runnable-track { background: transparent; }

        /* Search */
        #fp-search-wrap {
            padding: 11px 16px;
            border-bottom: 1px solid #f0f0f0;
            flex-shrink: 0;
        }
        #fp-search {
            width: 100%;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px;
            padding: 7px 10px;
            border: 1.5px solid #ddd;
            background: #fff;
            outline: none;
            color: #111;
            letter-spacing: 0.02em;
        }
        #fp-search:focus { border-color: #111; }
        #fp-search::placeholder { color: #ccc; letter-spacing: 0.02em; }

        /* Micro timeline bar */
        #fp-micro-tl-wrap {
            padding: 8px 0 0;
        }
        #fp-micro-tl {
            display: block;
            width: 100%;
            height: 28px;
            overflow: visible;
        }

        /* Results count */
        #fp-count-row {
            padding: 10px 16px;
            border-bottom: 1px solid #f0f0f0;
        }
        #fp-count {
            font-size: 10px;
            color: #999;
            letter-spacing: 0.04em;
        }

        /* Contribute section */
        #fp-contribute {
            margin: 16px;
            border: 1.5px solid #111;
            padding: 16px;
            flex-shrink: 0;
        }
        #fp-contribute-heading {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #111;
            margin-bottom: 6px;
        }
        #fp-contribute p {
            font-size: 10px;
            color: #666;
            line-height: 1.7;
            margin-bottom: 14px;
            font-style: italic;
        }
        .fp-contribute-btn {
            display: block;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 9px;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            text-decoration: none;
            color: #fff;
            background: #111;
            padding: 10px 14px;
            text-align: center;
            transition: background 0.15s;
        }
        .fp-contribute-btn:hover { background: #333; }

        #divider { display: none; }

        /* ── Right panel (wraps toggle + map/timeline) ── */
        #right-panel {
            flex: 1;
            min-width: 300px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }
        #view-toggle {
            display: flex;
            background: #fff;
            padding: 10px 16px 14px;
            border-bottom: 1px solid #e8e8e8;
            flex-shrink: 0;
            gap: 4px;
        }
        .view-btn {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 9px;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 7px 14px;
            border: 1.5px solid #ddd;
            border-radius: 0;
            background: none;
            color: #aaa;
            cursor: pointer;
            transition: color 0.12s, border-color 0.12s, background 0.12s;
        }
        .view-btn.active { color: #111; border-color: #111; background: #111; color: #fff; }
        .view-btn:hover:not(.active) { color: #555; border-color: #555; }

        /* ── Map panel ── */
        #map-panel {
            flex: 1;
            position: relative;
            min-height: 0;
            overflow: hidden;
        }
        #map { width: 100%; height: 100%; }

        /* ── Timeline card view ── */
        #timeline-view {
            flex: 1;
            overflow-y: auto;
            display: none;
            background: #fff;
            scrollbar-width: thin;
            scrollbar-color: #e0e0e0 transparent;
        }
        #tl-col-hdr {
            position: sticky;
            top: 0;
            z-index: 10;
            background: #fff;
            border-bottom: 1.5px solid #111;
            display: none;
        }
        .tl-col-label {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 9px;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #aaa;
            text-align: center;
            padding: 8px 2px;
            overflow: hidden;
            white-space: nowrap;
        }
        #tl-cards {
            position: relative;
        }
        .tl-card {
            position: absolute;
            display: flex;
            background: #fff;
            border: 1px solid #ececec;
            cursor: pointer;
            overflow: hidden;
            transition: box-shadow 0.15s, border-color 0.15s;
        }
        .tl-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .tl-card.open {
            z-index: 5;
            border-color: #222;
            box-shadow: 0 4px 20px rgba(0,0,0,0.13);
            overflow: visible;
        }
        .tl-card-accent { width: 3px; flex-shrink: 0; }
        .tl-card-inner { flex: 1; padding: 6px 7px 7px 6px; min-width: 0; overflow: hidden; }
        .tl-card.open .tl-card-inner { overflow: visible; }
        .tl-card-date {
            font-size: 8px;
            letter-spacing: 0.06em;
            font-weight: 600;
            color: #111;
            margin-bottom: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .tl-card-title {
            font-size: 10px;
            font-weight: 600;
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .tl-card.open .tl-card-title {
            display: block;
            overflow: visible;
            -webkit-line-clamp: unset;
        }
        .tl-card-expand {
            display: none;
            padding: 6px 7px 9px;
            border-top: 1px solid #f0f0f0;
            margin-top: 4px;
        }
        .tl-card.open .tl-card-expand { display: block; }
        .tl-card-sub-text {
            font-size: 9px;
            color: #666;
            font-style: italic;
            line-height: 1.4;
            margin-bottom: 5px;
        }
        .tl-card-body-text {
            font-size: 9px;
            color: #333;
            line-height: 1.55;
            margin-bottom: 7px;
        }
        .tl-card-src-link {
            display: inline-block;
            font-size: 8px;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: #888;
            text-decoration: none;
            border-bottom: 1px solid #ddd;
            margin-right: 8px;
        }
        .tl-card-src-link:hover { color: #111; border-color: #111; }
        .tl-card-contrib {
            font-size: 8px;
            color: #bbb;
            margin-top: 6px;
        }
        .tl-empty {
            padding: 60px 24px;
            font-size: 11px;
            color: #bbb;
            font-style: italic;
        }

        .mapboxgl-ctrl-top-right { top: 4px !important; }
        .mapboxgl-ctrl-top-left  { top: 4px !important; left: 4px !important; }
        .mapboxgl-ctrl-bottom-right { bottom: 8px !important; }

        /* ── Detail panel ── */
        #detail {
            position: absolute;
            top: 50px;
            left: -380px;
            width: 340px;
            max-height: calc(100% - 62px);
            background: #fff;
            color: #000;
            z-index: 2000;
            overflow-y: auto;
            transition: left 0.35s cubic-bezier(0.16, 1, 0.3, 1);
            scrollbar-width: thin;
        }
        #detail.open { left: 12px; }

        .d-accent   { height: 4px; }
        .d-wrap     { padding: 16px 18px 22px; }
        .d-top      { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 11px; }
        .d-badge    { font-size: 8px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: #fff; padding: 4px 8px; }
        .d-close    { background: none; border: none; font-size: 18px; cursor: pointer; color: #ccc; font-family: inherit; line-height: 1; padding: 2px; }
        .d-close:hover { color: #000; }
        .d-year     { font-size: 10px; color: #111; letter-spacing: 0.06em; margin-bottom: 4px; }
        .d-title    { font-size: 15px; font-weight: 600; line-height: 1.3; margin-bottom: 5px; }
        .d-sub      { font-size: 11px; color: #777; font-style: italic; line-height: 1.5; margin-bottom: 12px; }
        .d-rule     { height: 1px; background: #f0f0f0; margin-bottom: 12px; }
        .d-text     { font-size: 11px; line-height: 1.8; color: #333; font-weight: 300; margin-bottom: 14px; }
        .d-cite        { font-size: 9px; color: #bbb; font-style: italic; margin-bottom: 8px; line-height: 1.5; }
        .d-contributor { font-size: 9px; color: #bbb; letter-spacing: 0.05em; margin-bottom: 12px; }
        .d-sources  { display: flex; flex-direction: column; gap: 6px; }
        .src-btn    { display: block; font-family: inherit; font-size: 9px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; text-decoration: none; color: #000; border: 1.5px solid #000; padding: 7px 12px; text-align: center; transition: background 0.15s, color 0.15s; }
        .src-btn:hover { background: #000; color: #fff; }
        .preview-toggle { font-family: inherit; font-size: 9px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; color: #aaa; background: none; border: 1.5px solid #e0e0e0; padding: 7px 12px; width: 100%; transition: border-color 0.15s, color 0.15s; }
        .preview-toggle:hover { border-color: #000; color: #000; }
        .preview-wrap { display: none; margin-top: 6px; }
        .preview-wrap.open { display: block; }
        .preview-wrap iframe { width: 100%; height: 240px; border: 1px solid #e0e0e0; display: block; }

        /* ── Bottom-left panel: citation stacked ── */
        #map-bl-panel {
            position: absolute;
            bottom: 12px; left: 12px;
            z-index: 999;
            display: flex; flex-direction: column; gap: 6px;
            pointer-events: none;
        }
        #map-cite {
            background: rgba(255,255,255,0.95);
            border: 1px solid #e0e0e0;
            padding: 10px 13px;
            display: flex; flex-direction: column; gap: 3px;
        }
        #map-cite-basemap {
            font-size: 10px; letter-spacing: 0.07em; text-transform: uppercase;
            color: #333;
        }
        #map-cite-sources {
            font-size: 9px; letter-spacing: 0.04em;
            color: #888;
        }
        #tiles-toggle-wrap {
            background: rgba(255,255,255,0.95);
            border: 1px solid #e0e0e0;
            padding: 8px 13px;
            pointer-events: all;
        }
        #tiles-toggle-wrap label {
            display: flex; align-items: center; gap: 7px;
            font-size: 9px; letter-spacing: 0.07em; text-transform: uppercase;
            color: #333; cursor: pointer; user-select: none;
        }
        #tiles-toggle-wrap input[type=checkbox] {
            accent-color: #111;
            width: 11px; height: 11px; cursor: pointer; flex-shrink: 0;
        }

        /* ── Tooltip ── */
        #map-tip {
            position: fixed;
            background: #fff;
            color: #000;
            padding: 8px 11px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 10px;
            pointer-events: none;
            display: none;
            z-index: 9000;
            border: 1px solid #ddd;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            max-width: 210px;
            line-height: 1.4;
        }
    </style>
</head>
<body>

<div id="layout">

    <!-- Left: Filter panel -->
    <div id="filter-panel">
        <div id="fp-header">
            <span id="fp-title">Block History Map</span>
            <span id="fp-sub">preserve, share, and learn about your block</span>
        </div>

        <div id="view-toggle">
            <button id="btn-map" class="view-btn active">Map</button>
            <button id="btn-timeline" class="view-btn">Timeline</button>
        </div>

        <div id="fp-search-wrap">
            <input type="text" id="fp-search" placeholder="Search events…" autocomplete="off" spellcheck="false">
        </div>

        <div class="fp-section">
            <div class="fp-section-label">Years</div>
            <div class="year-range-wrap">
                <div class="year-range-labels">
                    <span id="fp-yr-min-lbl">1600</span>
                    <span id="fp-yr-max-lbl">2026</span>
                </div>
                <div class="dual-slider">
                    <div class="dual-slider-bg"></div>
                    <div class="dual-slider-fill" id="fp-slider-fill"></div>
                    <input type="range" id="fp-yr-min" min="1600" max="2026" step="1" value="1600">
                    <input type="range" id="fp-yr-max" min="1600" max="2026" step="1" value="2026">
                </div>
                <div id="fp-micro-tl-wrap">
                    <svg id="fp-micro-tl" preserveAspectRatio="none"></svg>
                </div>
            </div>
        </div>

        <div class="fp-section">
            <div class="fp-section-label">Theme</div>
            <div class="fp-chips" id="fp-type-chips"></div>
        </div>

        <div class="fp-section">
            <div class="fp-section-label">Format</div>
            <div class="fp-chips" id="fp-content-chips"></div>
        </div>

        <div class="fp-section">
            <div class="fp-section-label">Scale</div>
            <div class="fp-chips" id="fp-scope-chips"></div>
        </div>

        <div id="fp-count-row"><span id="fp-count">– events</span></div>

        <div id="fp-contribute">
            <div id="fp-contribute-heading">Share Your History</div>
            <p>Add a memory, story, or event from your block to this map.</p>
            <a href="https://docs.google.com/forms/d/e/1FAIpQLSca1IfeaozUZ2B0zURgmUg48TUkv1v-ih-5JaK8X9yvSfuL4g/viewform?usp=header" target="_blank" rel="noopener" class="fp-contribute-btn">Open Survey ↗</a>
        </div>
    </div>

    <!-- Draggable divider -->
    <div id="divider"></div>

    <!-- Right panel: map / timeline -->
    <div id="right-panel">
        <div id="map-panel">
            <div id="map"></div>
            <div id="map-bl-panel">
                <div id="map-cite">
                    <div id="map-cite-basemap">Current satellite</div>
                    <div id="map-cite-sources">Historical tiles: NYC Map Warper · NYPL · NYC DoITT · Mapbox</div>
                </div>
                <div id="tiles-toggle-wrap">
                    <label>
                        <input type="checkbox" id="tiles-checkbox" checked>
                        Historical maps
                    </label>
                </div>
            </div>
        </div>

        <div id="timeline-view">
            <div id="tl-col-hdr"></div>
            <div id="tl-cards"></div>
        </div>

        <div id="detail">
            <div class="d-accent" id="d-accent"></div>
            <div class="d-wrap">
                <div class="d-top">
                    <div class="d-badge" id="d-badge"></div>
                    <button class="d-close" id="d-close">×</button>
                </div>
                <div class="d-year"    id="d-year"></div>
                <div class="d-title"   id="d-title"></div>
                <div class="d-sub"     id="d-sub"></div>
                <div class="d-rule"></div>
                <div class="d-text"        id="d-text"></div>
                <div class="d-cite"        id="d-cite"></div>
                <div class="d-contributor" id="d-contributor" style="display:none"></div>
                <div class="d-sources"     id="d-sources"></div>
            </div>
        </div>
    </div>
</div>

<div id="map-tip"></div>

<script src="https://api.mapbox.com/mapbox-gl-js/v3.0.1/mapbox-gl.js"></script>
<script>

/* ── Types ── */
const TYPE_COLORS = {
    Organizing:    '#27AE60',
    Government:    '#2980B9',
    Migration:     '#8E44AD',
    Culture:       '#F39C12',
    Crisis:        '#C0392B',
    Displacement:  '#E67E22',
    'Everyday Life': '#16A085',
};
function resolveType(ev) { return TYPE_COLORS[ev.type] ? ev.type : 'Organizing'; }

/* ── Eras ── */
const ERAS = [
    { name:'Preconditions',         range:'Pre-1890',     start:1600, end:1889 },
    { name:'Form Emerges',          range:'1890–1930',    start:1890, end:1929 },
    { name:'Racial Transition',     range:'1930–1960',    start:1930, end:1959 },
    { name:'Self-Determination',    range:'1960–1980',    start:1960, end:1979 },
    { name:'Crisis & Retrenchment', range:'1980–2000',    start:1980, end:1999 },
    { name:'Gentrification Era',    range:'2000–present', start:2000, end:2026 },
];
function eraForYear(y) { return ERAS.find(e => y <= e.end) || ERAS[ERAS.length - 1]; }

/* ── Scope columns ── */
const SCOPE_ORDER = ['Federal', 'Regional', 'Citywide', 'Neighborhood', 'Block'];

/* ── Spatial detection ── */
const GENERIC = [
    { lat:40.6872, lng:-73.9418 },
    { lat:40.6782, lng:-73.9442 },
    { lat:40.7128, lng:-74.006  },
];
function isSpatial(ev) {
    return !GENERIC.some(g => Math.abs(ev.lat - g.lat) < 0.0005 && Math.abs(ev.lng - g.lng) < 0.0005);
}

/* ── Basemaps ── */
const BASEMAPS = [
    { before:1800, urls:['https://a.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}.png'], label:'Pre-map era' },
    { before:1807, urls:['https://mapwarper.net/maps/tile/47170/{z}/{x}/{y}.png'], label:'Brooklyn 1800' },
    { before:1855, urls:['https://mapwarper.net/maps/tile/47170/{z}/{x}/{y}.png','https://mapwarper.net/maps/tile/77083/{z}/{x}/{y}.png'], label:'Historical · 1800 + 1807' },

function setBasemap(year) {
    if (!mapLoaded) return;
    const spec = BASEMAPS.find(b => year < b.before);
    if (activeSpecBefore === spec.before) return;
    activeSpecBefore = spec.before;

    // Immediately hide old layers so they don't ghost under incoming tiles
    activeLayerIds.forEach(id => {
        try { map.setPaintProperty(id, 'raster-opacity', 0); } catch(e) {}
    });

    // Capture refs for deferred cleanup, then clear active lists
    const staleLayerIds   = [...activeLayerIds];
    const staleSourceIds  = [...activeSourceIds];
    activeLayerIds  = [];
    activeSourceIds = [];

    const n = layerCounter++;
    const isModern = spec.urls.length === 1 && spec.urls[0] === 'mapbox://mapbox.satellite';

    // For historical eras, insert a white-land / grey-water base: a world-covering
    // grey polygon for water, with a white Mapbox Streets land fill on top.
    // No streets or infrastructure — just land outline.
    if (!isModern) {
        const wsid = `h-s-${n}-water`, wlid = `h-l-${n}-water`;
        const lsid = `h-s-${n}-land`,  llid = `h-l-${n}-land`;
        // Grey water background: world-covering GeoJSON polygon
        map.addSource(wsid, {
            type: 'geojson',
            data: { type: 'Feature', geometry: { type: 'Polygon',
                coordinates: [[[-180,-90],[180,-90],[180,90],[-180,90],[-180,-90]]] } }
        });
        map.addLayer({ id: wlid, type: 'fill', source: wsid,
            paint: { 'fill-color': '#c8c8c8' } }, 'events-layer');
        // White land fill: Mapbox Streets v8 land polygons
        map.addSource(lsid, { type: 'vector', url: 'mapbox://mapbox.mapbox-streets-v8' });
        map.addLayer({ id: llid, type: 'fill', source: lsid, 'source-layer': 'land',
            paint: { 'fill-color': '#ffffff' } }, 'events-layer');
        activeLayerIds.push(wlid, llid);
        activeSourceIds.push(wsid, lsid);
    }

    spec.urls.forEach((url, i) => {
        const sid = `h-s-${n}-${i}`, lid = `h-l-${n}-${i}`;
        const src = url === 'mapbox://mapbox.satellite'
            ? { type:'raster', url:'mapbox://mapbox.satellite', tileSize:256 }
            : { type:'raster', tiles:[url], tileSize:256 };
        map.addSource(sid, src);
        map.addLayer({ id:lid, type:'raster', source:sid, paint:{ 'raster-fade-duration':0 } }, 'events-layer');
        activeLayerIds.push(lid);
        activeSourceIds.push(sid);
    });

    // Remove stale layers/sources after one frame so Mapbox finishes its render cycle
    if (!tilesVisible) setTilesVisibility(false);

    requestAnimationFrame(() => {
        staleLayerIds.forEach(id  => { try { map.removeLayer(id);  } catch(e) {} });
        staleSourceIds.forEach(id => { try { map.removeSource(id); } catch(e) {} });
    });

    document.getElementById('map-cite-basemap').textContent = spec.label;
}
function applyJitter(events) {
    const groups = {};
    events.forEach(ev => { const k = `${ev.lat.toFixed(3)},${ev.lng.toFixed(3)}`; (groups[k]=groups[k]||[]).push(ev); });
    events.forEach(ev => {
        const g = groups[`${ev.lat.toFixed(3)},${ev.lng.toFixed(3)}`];
        if (g.length===1) { ev._lat=ev.lat; ev._lng=ev.lng; return; }
        const i=g.indexOf(ev), angle=2*Math.PI*i/g.length, r=0.0013;
        ev._lat=ev.lat+r*Math.sin(angle); ev._lng=ev.lng+r*Math.cos(angle);
    });
}
let searchQuery = '';
function getFilteredEvents() {
    const q = searchQuery.trim().toLowerCase();
    return allEvents.filter(ev => {
        const y = parseInt(ev.date_start, 10);
        if (y < yearMin || y > yearMax) return false;
        if (!activeTypes.has(resolveType(ev))) return false;
        if (ev.content_type && !activeContentTypes.has(ev.content_type)) return false;
        if (ev.scope && !activeScopes.has(ev.scope)) return false;
        if (q) {
            const hay = [ev.title, ev.subtitle, ev.body, ev.location, ev.address, ev.contributor]
                .map(s => (s || '').toLowerCase()).join(' ');
            if (!hay.includes(q)) return false;

    }).sort((a, b) => parseInt(a.date_start) - parseInt(b.date_start));

function buildMicroTimeline() {

    if (!svg || !allEvents.length) return;
    const W = svg.parentElement.clientWidth || 280;
    const H = 28;
    svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
    svg.setAttribute('width', W);
    svg.setAttribute('height', H);
    svg.innerHTML = '';
    const NS = 'http://www.w3.org/2000/svg';
    const xOf = y => (y - MIN_YEAR) / (MAX_YEAR - MIN_YEAR) * W;

    // Selected range fill
    const rx1 = xOf(yearMin), rx2 = xOf(yearMax);
    const fill = document.createElementNS(NS, 'rect');
    fill.setAttribute('x', rx1); fill.setAttribute('y', 0);
    fill.setAttribute('width', Math.max(0, rx2 - rx1)); fill.setAttribute('height', H);
    fill.setAttribute('fill', 'rgba(0,0,0,0.04)');
    svg.appendChild(fill);

    // Base line
    const line = document.createElementNS(NS, 'line');
    line.setAttribute('x1', 0); line.setAttribute('y1', H / 2);
    line.setAttribute('x2', W); line.setAttribute('y2', H / 2);
    line.setAttribute('stroke', '#e8e8e8'); line.setAttribute('stroke-width', 1);
    svg.appendChild(line);

    // Event marks — all events, colored if matching current filters
    const filtered = new Set(getFilteredEvents().map(e => e.id));
    allEvents.forEach(ev => {
        const y = parseInt(ev.date_start, 10);
        const x = xOf(y);
        const color = TYPE_COLORS[resolveType(ev)] || '#888';
        const active = filtered.has(ev.id);
        const dot = document.createElementNS(NS, 'circle');
        dot.setAttribute('cx', x); dot.setAttribute('cy', H / 2);
        dot.setAttribute('r', active ? 3 : 2);
        dot.setAttribute('fill', active ? color : '#ddd');
        dot.setAttribute('opacity', active ? '0.9' : '0.35');
        svg.appendChild(dot);
    });
}

const TL_PX_PER_YEAR = 10;
const TL_AXIS_W      = 52;
const TL_PAD_TOP     = 16;
const TL_CARD_GAP    = 5;
const TL_COL_GAP     = 6;

function buildTimelineCards() {
    const view      = document.getElementById('timeline-view');
    const container = document.getElementById('tl-cards');
    const header    = document.getElementById('tl-col-hdr');
    if (!container) return;
    container.innerHTML = '';

    const events  = getFilteredEvents();
    if (!events.length) {
        container.style.height = '';
        if (header) header.style.display = 'none';
        container.innerHTML = '<div class="tl-empty">No events match the current filters.</div>';
        return;
    }

    const totalW  = view.clientWidth || 700;
    const numCols = SCOPE_ORDER.length;
    const colW    = (totalW - TL_AXIS_W) / numCols;
    const cardW   = Math.max(60, colW - TL_COL_GAP);

    // Build sticky column header
    if (header) {
        header.style.display = 'flex';
        header.style.paddingLeft = TL_AXIS_W + 'px';
        header.innerHTML = '';
        SCOPE_ORDER.forEach(scope => {
            const lbl = document.createElement('div');
            lbl.className = 'tl-col-label';
            lbl.style.width = colW + 'px';
            lbl.textContent = scope;
            header.appendChild(lbl);
        });
    }

    container.style.height = '20000px';

    // Phase 1 — create all cards with width set, invisible
    const cardData = events.map(ev => {
        const year     = parseInt(ev.date_start, 10);
        const color    = TYPE_COLORS[resolveType(ev)] || '#888';
        const scopeIdx = Math.max(0, SCOPE_ORDER.indexOf(ev.scope || 'Neighborhood'));
        const colX     = TL_AXIS_W + scopeIdx * colW + TL_COL_GAP / 2;
        const dateLabel = ev.date_start + (ev.date_end ? '–' + ev.date_end : '');

        const card = document.createElement('div');
        card.className = 'tl-card';
        card.style.left = colX + 'px';
        card.style.width = cardW + 'px';
        card.style.visibility = 'hidden';
        card.addEventListener('click', () => {
            const wasOpen = card.classList.contains('open');
            container.querySelectorAll('.tl-card.open').forEach(c => c.classList.remove('open'));
            if (!wasOpen) card.classList.add('open');
        });

        const accent = document.createElement('div');
        accent.className = 'tl-card-accent';
        accent.style.background = color;

        const inner = document.createElement('div');
        inner.className = 'tl-card-inner';
        inner.innerHTML =
            `<div class="tl-card-date">${escH(dateLabel)}</div>` +
            `<div class="tl-card-title">${escH(ev.title)}</div>`;

        const expand = document.createElement('div');
        expand.className = 'tl-card-expand';
        let expandHtml = '';
        if (ev.subtitle) expandHtml += `<div class="tl-card-sub-text">${escH(ev.subtitle)}</div>`;
        if (ev.body)     expandHtml += `<div class="tl-card-body-text">${escH(ev.body)}</div>`;
        if (ev.source_url) {
            ev.source_url.split(/\s*\|\s*/).filter(Boolean).forEach((url, i, arr) => {
                expandHtml += `<a href="${escH(url)}" target="_blank" rel="noopener" class="tl-card-src-link">Source${arr.length > 1 ? ' ' + (i+1) : ''} ↗</a>`;
            });
        }
        if (ev.contributor && ev.contributor !== 'Delaney Connor') {
            expandHtml += `<div class="tl-card-contrib">Submitted by ${escH(ev.contributor)}</div>`;
        }
        expand.innerHTML = expandHtml;
        inner.appendChild(expand);

        card.appendChild(accent);
        card.appendChild(inner);
        container.appendChild(card);
        return { card, year, color, scopeIdx, colX };
    });

    // Phase 2 — measure all heights in one batch (one reflow)
    const heights = cardData.map(({ card }) => card.offsetHeight);

    // Phase 3 — position per column, stretching down when crowded
    const colBottoms = new Array(numCols).fill(TL_PAD_TOP);
    const tops = [];
    cardData.forEach(({ card, year, scopeIdx }, i) => {
        const idealTop = TL_PAD_TOP + (year - MIN_YEAR) * TL_PX_PER_YEAR;
        const top = Math.max(idealTop, colBottoms[scopeIdx] + TL_CARD_GAP);
        tops.push(top);
        card.style.top = top + 'px';
        card.style.visibility = 'visible';
        colBottoms[scopeIdx] = top + heights[i];
    });

    const totalH = Math.max(
        Math.max(...colBottoms) + 80,
        TL_PAD_TOP + (MAX_YEAR - MIN_YEAR) * TL_PX_PER_YEAR + 60
    );
    container.style.height = totalH + 'px';

    // Build full-width SVG (axis + column grid + event dots)
    const NS  = 'http://www.w3.org/2000/svg';
    const svg = document.createElementNS(NS, 'svg');
    svg.setAttribute('width', totalW);
    svg.setAttribute('height', totalH);
    svg.style.cssText = 'position:absolute;top:0;left:0;pointer-events:none;';

    // Column divider lines
    for (let i = 1; i < numCols; i++) {
        const x = TL_AXIS_W + i * colW;
        const d = document.createElementNS(NS, 'line');
        d.setAttribute('x1', x); d.setAttribute('y1', 0);
        d.setAttribute('x2', x); d.setAttribute('y2', totalH);
        d.setAttribute('stroke', '#f0f0f0'); d.setAttribute('stroke-width', 1);
        svg.appendChild(d);
    }

    // Vertical axis line
    const vline = document.createElementNS(NS, 'line');
    vline.setAttribute('x1', TL_AXIS_W); vline.setAttribute('y1', TL_PAD_TOP);
    vline.setAttribute('x2', TL_AXIS_W); vline.setAttribute('y2', totalH - 10);
    vline.setAttribute('stroke', '#ccc'); vline.setAttribute('stroke-width', 1);
    svg.appendChild(vline);

    // Year ticks + labels — font matches slider scale
    for (let y = MIN_YEAR; y <= MAX_YEAR; y += 10) {
        const py      = TL_PAD_TOP + (y - MIN_YEAR) * TL_PX_PER_YEAR;
        const isMajor = y % 50 === 0;
        const tick = document.createElementNS(NS, 'line');
        tick.setAttribute('x1', isMajor ? TL_AXIS_W - 12 : TL_AXIS_W - 5);
        tick.setAttribute('y1', py); tick.setAttribute('x2', TL_AXIS_W); tick.setAttribute('y2', py);
        tick.setAttribute('stroke', isMajor ? '#aaa' : '#e0e0e0'); tick.setAttribute('stroke-width', 1);
        svg.appendChild(tick);
        if (isMajor) {
            const lbl = document.createElementNS(NS, 'text');
            lbl.setAttribute('x', TL_AXIS_W - 16); lbl.setAttribute('y', py + 4);
            lbl.setAttribute('text-anchor', 'end');
            lbl.setAttribute('font-family', 'IBM Plex Mono, monospace');
            lbl.setAttribute('font-size', 11);
            lbl.setAttribute('font-weight', 600);
            lbl.setAttribute('fill', '#333');
            lbl.setAttribute('letter-spacing', '0.04em');
            lbl.textContent = y;
            svg.appendChild(lbl);
        }
    }

    // Event dots on axis + horizontal guide to card column
    cardData.forEach(({ year, color, colX }, i) => {
        const axisY  = TL_PAD_TOP + (year - MIN_YEAR) * TL_PX_PER_YEAR;
        const cardY  = tops[i] + heights[i] / 2;

        // Faint connector if card is displaced vertically
        if (Math.abs(cardY - axisY) > 8) {
            const conn = document.createElementNS(NS, 'line');
            conn.setAttribute('x1', TL_AXIS_W); conn.setAttribute('y1', axisY);
            conn.setAttribute('x2', TL_AXIS_W); conn.setAttribute('y2', cardY);
            conn.setAttribute('stroke', color); conn.setAttribute('stroke-width', 1);
            conn.setAttribute('opacity', '0.2');
            svg.appendChild(conn);
        }

        // Horizontal guide from axis to card column
        const guide = document.createElementNS(NS, 'line');
        guide.setAttribute('x1', TL_AXIS_W); guide.setAttribute('y1', axisY);
        guide.setAttribute('x2', colX);      guide.setAttribute('y2', axisY);
        guide.setAttribute('stroke', color); guide.setAttribute('stroke-width', 0.75);
        guide.setAttribute('opacity', '0.25');
        svg.appendChild(guide);

        const dot = document.createElementNS(NS, 'circle');
        dot.setAttribute('cx', TL_AXIS_W); dot.setAttribute('cy', axisY);
        dot.setAttribute('r', 3); dot.setAttribute('fill', color);
        svg.appendChild(dot);
    });

    container.insertBefore(svg, container.firstChild);
}

            if (!layer) return;
            if (layer.type === 'raster') {
                map.setPaintProperty(id, 'raster-opacity', visible ? 1 : 0);
            } else if (layer.type === 'fill') {
                map.setPaintProperty(id, 'fill-opacity', visible ? 1 : 0);
            }
        } catch(e) {}
    });
}
document.getElementById('tiles-checkbox').addEventListener('change', e => setTilesVisibility(e.target.checked));

/* ── Detail panel ── */
function escH(s) { return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function buildSrcs(raw, evId) {
    if (!raw) return '<div style="font-size:9px;color:#ccc;font-style:italic">No linked source</div>';
    return raw.split(/\s*\|\s*/).filter(Boolean).map((url,i) => {
        const label = `Read Source${raw.includes('|')?' '+(i+1):''} ↗`;
        const canEmbed = url.includes('.pdf')||url.includes('ourstuyheights')||url.includes('nypl.org')||url.includes('citizensnyc.org');
        const pid = `pv-${evId}-${i}`;
        let h = `<a href="${escH(url)}" target="_blank" rel="noopener" class="src-btn">${label}</a>`;
        if (canEmbed) h += `<button class="preview-toggle" onclick="togglePrev('${pid}')">Preview ▾</button><div class="preview-wrap" id="${pid}"><iframe src="${escH(url)}" loading="lazy" sandbox="allow-scripts allow-same-origin allow-forms"></iframe></div>`;
        return h;
    }).join('');
}
function togglePrev(id) {
    const el = document.getElementById(id);
    if (!el) return;
    el.previousElementSibling.textContent = el.classList.toggle('open') ? 'Preview ▴' : 'Preview ▾';
}
function showDetail(ev, color) {
    document.getElementById('d-accent').style.background = color;
    document.getElementById('d-badge').textContent       = resolveType(ev);
    document.getElementById('d-badge').style.background  = color;
    const dateDisplay = ev.date_start + (ev.date_end ? ' – ' + ev.date_end : '');
    const contentLabel = ev.content_type ? ' · ' + ev.content_type : '';
    document.getElementById('d-year').textContent        = dateDisplay + contentLabel;
    document.getElementById('d-title').textContent       = ev.title;
    document.getElementById('d-sub').textContent         = ev.subtitle || '';
    document.getElementById('d-text').textContent        = ev.body;
    document.getElementById('d-cite').textContent        = ev.citation ? 'Source: '+ev.citation : '';
    const contrib = (ev.contributor && ev.contributor !== 'Delaney Connor') ? 'Submitted by ' + ev.contributor : '';
    const contribEl = document.getElementById('d-contributor');
    if (contribEl) { contribEl.textContent = contrib; contribEl.style.display = contrib ? 'block' : 'none'; }
    document.getElementById('d-sources').innerHTML       = buildSrcs(ev.source_url, ev.id);
    document.getElementById('detail').classList.add('open');
}
document.getElementById('d-close').addEventListener('click', () => document.getElementById('detail').classList.remove('open'));

function buildLegend() {
    const el = document.getElementById('legend');
    Object.entries(TYPE_COLORS).forEach(([type,color]) => {
        const row = document.createElement('div');
        row.className = 'leg-row';
        row.innerHTML = `<div class="leg-dot" style="background:${color}"></div><span class="leg-label">${type}</span>`;
        el.appendChild(row);
    });
}

/* ── Filter state ── */
const MIN_YEAR = 1600, MAX_YEAR = 2026;
let allEvents = [], yearMin = MIN_YEAR, yearMax = MAX_YEAR;
let activeTypes        = new Set(Object.keys(TYPE_COLORS));
let activeContentTypes = new Set(['Person', 'Place', 'Event', 'Story']);
let activeScopes       = new Set(SCOPE_ORDER);
let activeView         = 'map';

function updateYearSlider() {
    let v1 = parseInt(document.getElementById('fp-yr-min').value);
    let v2 = parseInt(document.getElementById('fp-yr-max').value);
    if (v1 > v2) { const t = v1; v1 = v2; v2 = t; }
    yearMin = v1; yearMax = v2;
    document.getElementById('fp-yr-min-lbl').textContent = v1;
    document.getElementById('fp-yr-max-lbl').textContent = v2;
    const fill = document.getElementById('fp-slider-fill');
    const pct1 = (v1 - MIN_YEAR) / (MAX_YEAR - MIN_YEAR) * 100;
    const pct2 = (v2 - MIN_YEAR) / (MAX_YEAR - MIN_YEAR) * 100;
    fill.style.left  = pct1 + '%';
    fill.style.width = (pct2 - pct1) + '%';
    updateMapFilter();
}

function toggleChip(btn, filterSet, value) {
    if (filterSet.has(value)) { filterSet.delete(value); btn.classList.remove('active'); }
    else                       { filterSet.add(value);    btn.classList.add('active'); }
    updateMapFilter();
}

function buildFilterChips() {
    const typeEl = document.getElementById('fp-type-chips');
    typeEl.innerHTML = '';
    Object.entries(TYPE_COLORS).forEach(([type, color]) => {
        const btn = document.createElement('button');
        btn.className = 'fp-chip active';
        btn.innerHTML = `<span class="chip-dot" style="background:${color}"></span>${type}`;
        btn.addEventListener('click', () => toggleChip(btn, activeTypes, type));
        typeEl.appendChild(btn);
    });

    const contentEl = document.getElementById('fp-content-chips');
    contentEl.innerHTML = '';
    ['Person', 'Place', 'Event', 'Story'].forEach(ct => {
        const btn = document.createElement('button');
        btn.className = 'fp-chip active';
        btn.textContent = ct;
        btn.addEventListener('click', () => toggleChip(btn, activeContentTypes, ct));
        contentEl.appendChild(btn);
    });

    const scopeEl = document.getElementById('fp-scope-chips');
    scopeEl.innerHTML = '';
    SCOPE_ORDER.forEach(scope => {
        const btn = document.createElement('button');
        btn.className = 'fp-chip active';
        btn.textContent = scope;
        btn.addEventListener('click', () => toggleChip(btn, activeScopes, scope));
        scopeEl.appendChild(btn);
    });
}

document.getElementById('fp-yr-min').addEventListener('input', updateYearSlider);
document.getElementById('fp-yr-max').addEventListener('input', updateYearSlider);
updateYearSlider();

document.getElementById('fp-search').addEventListener('input', e => {
    searchQuery = e.target.value;
    updateMapFilter();
});

/* ── View toggle ── */
document.getElementById('btn-map').addEventListener('click', () => {
    if (activeView === 'map') return;
    activeView = 'map';
    document.getElementById('btn-map').classList.add('active');
    document.getElementById('btn-timeline').classList.remove('active');
    document.getElementById('map-panel').style.display = '';

});
document.getElementById('btn-timeline').addEventListener('click', () => {
    if (activeView === 'timeline') return;

    document.getElementById('btn-map').classList.remove('active');

/* ── Boot ── */
const SHEET_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQN-ypfkWmCiKmf618fHMDF6PSDn3j33te6csSoZyxjM2p5RpG1PvN53Q_7wL4Tju8WJMk_sKJEiaMN/pub?gid=612286300&single=true&output=csv';

function parseCSV(text) {
    const rows = [];
    let row = [], field = '', inQuote = false;
    for (let i = 0; i < text.length; i++) {
        const ch = text[i], next = text[i + 1];
        if (inQuote) {
            if (ch === '"' && next === '"') { field += '"'; i++; }
            else if (ch === '"') { inQuote = false; }
            else { field += ch; }
        } else {
            if (ch === '"') { inQuote = true; }
            else if (ch === ',') { row.push(field); field = ''; }
            else if (ch === '\n' || (ch === '\r' && next === '\n')) {
                if (ch === '\r') i++;
                row.push(field); field = '';
                if (row.some(c => c !== '')) rows.push(row);
                row = [];
            } else { field += ch; }
        }
    }
    if (row.length) { row.push(field); if (row.some(c => c !== '')) rows.push(row); }
    return rows;
}

function csvToEvents(text) {
    const rows = parseCSV(text);
    if (rows.length < 2) return [];
    const headers = rows[0].map(h => h.trim());
    return rows.slice(1).map(row => {
        const obj = {};
        headers.forEach((h, i) => { obj[h] = (row[i] || '').trim(); });
        obj.id           = parseInt(obj.id, 10) || 0;
        obj.lat          = parseFloat(obj.lat)  || 0;
        obj.lng          = parseFloat(obj.lng)  || 0;
        obj.date_start   = obj.date_start   || obj.year || '';
        obj.date_end     = obj.date_end     || '';
        obj.content_type = obj.content_type || '';
        obj.media_type   = obj.media_type   || '';
        obj.media_url    = obj.media_url    || '';
        obj.contributor  = obj.contributor  || '';
        if (!obj.source_url) obj.source_url = null;
        return obj;
    });
}

function loadAndInit(data) {
    allEvents = data;
    applyJitter(allEvents);
    buildFilterChips();
    buildMicroTimeline();
    updateCount();
    if (activeView === 'timeline') buildTimelineCards();
    if (mapLoaded) updateMapFilter();
}

fetch(SHEET_CSV)
    .then(r => { if (!r.ok) throw new Error(r.status); return r.text(); })
    .then(text => loadAndInit(csvToEvents(text)))
    .catch(() => {
        console.warn('Google Sheet unavailable — loading local ba_timeline.json');
        fetch('data/ba_timeline.json').then(r => r.json()).then(loadAndInit);
    });
