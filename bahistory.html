<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BA History — Bed-Stuy Works Alliance</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; font-family: 'IBM Plex Mono', monospace; background: #0a0a0a; }

        /* ── Map area ── */
        #app {
            position: absolute;
            inset: 0;
            bottom: 190px;
        }
        #map { width: 100%; height: 100%; }

        /* Grayscale basemap tiles; colored SVG markers are in a separate pane, unaffected */
        .leaflet-tile-pane { filter: grayscale(1) contrast(1.1); }

        /* Dark outline on white label text — drop-shadow traces the alpha channel,
           so the shadow wraps each letter rather than the tile box */
        .leaflet-overlay-pane .leaflet-tile {
            filter: brightness(2) contrast(2)
                    drop-shadow(0 0 3px #000)
                    drop-shadow(0 0 2px #000)
                    drop-shadow(0 0 1px #000);
        }

        /* ── 2D Timeline Chart ── */
        #chart {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 190px;
            background: #080808;
            border-top: 1px solid #1a1a1a;
            z-index: 1000;
            overflow: hidden;
        }

        #chart-hud {
            position: absolute;
            top: 8px; left: 108px;
            display: flex;
            align-items: baseline;
            gap: 11px;
            pointer-events: none;
            z-index: 2;
        }
        #chart-year {
            font-size: 19px;
            font-weight: 600;
            color: #fff;
            min-width: 44px;
            line-height: 1;
        }
        #chart-era {
            font-size: 8px;
            color: #888;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        #chart-svg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
        }

        /* ── Map detail panel (slides in from left) ── */
        #detail {
            position: absolute;
            top: 12px;
            left: -380px;
            width: 340px;
            max-height: calc(100% - 214px);
            background: #fff;
            color: #000;
            z-index: 2000;
            overflow-y: auto;
            transition: left 0.35s cubic-bezier(0.16, 1, 0.3, 1);
            scrollbar-width: thin;
        }
        #detail.open { left: 12px; }

        .d-accent   { height: 4px; }
        .d-wrap     { padding: 16px 18px 22px; }
        .d-top      { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 11px; }
        .d-badge    { font-size: 8px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: #fff; padding: 4px 8px; }
        .d-close    { background: none; border: none; font-size: 18px; cursor: pointer; color: #ccc; font-family: inherit; line-height: 1; padding: 2px; }
        .d-close:hover { color: #000; }
        .d-year     { font-size: 10px; color: #aaa; letter-spacing: 0.06em; margin-bottom: 4px; }
        .d-title    { font-size: 15px; font-weight: 600; line-height: 1.3; margin-bottom: 5px; }
        .d-sub      { font-size: 11px; color: #777; font-style: italic; line-height: 1.5; margin-bottom: 12px; }
        .d-rule     { height: 1px; background: #f0f0f0; margin-bottom: 12px; }
        .d-text     { font-size: 11px; line-height: 1.8; color: #333; font-weight: 300; margin-bottom: 14px; }
        .d-cite     { font-size: 9px; color: #bbb; font-style: italic; margin-bottom: 12px; line-height: 1.5; }
        .d-sources  { display: flex; flex-direction: column; gap: 6px; }
        .src-btn    { display: block; font-family: inherit; font-size: 9px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; text-decoration: none; color: #000; border: 1.5px solid #000; padding: 7px 12px; text-align: center; transition: background 0.15s, color 0.15s; }
        .src-btn:hover { background: #000; color: #fff; }
        .preview-toggle { font-family: inherit; font-size: 9px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; color: #aaa; background: none; border: 1.5px solid #e0e0e0; padding: 7px 12px; width: 100%; transition: border-color 0.15s, color 0.15s; }
        .preview-toggle:hover { border-color: #000; color: #000; }
        .preview-wrap { display: none; margin-top: 6px; }
        .preview-wrap.open { display: block; }
        .preview-wrap iframe { width: 100%; height: 240px; border: 1px solid #e0e0e0; display: block; }

        /* ── Legend ── */
        #legend {
            position: absolute;
            top: 12px; right: 12px;
            z-index: 999;
            background: rgba(10,10,10,0.82);
            padding: 9px 12px;
            display: flex; flex-direction: column; gap: 5px;
            pointer-events: none;
        }
        .leg-row   { display: flex; align-items: center; gap: 7px; }
        .leg-dot   { width: 9px; height: 9px; border-radius: 50%; border: 1.5px solid rgba(255,255,255,0.2); flex-shrink: 0; }
        .leg-label { font-size: 8px; letter-spacing: 0.08em; text-transform: uppercase; color: #bbb; }

        #basemap-badge {
            position: absolute;
            bottom: 202px; left: 12px;
            z-index: 999;
            font-size: 8px; letter-spacing: 0.08em; text-transform: uppercase;
            color: #555; background: rgba(10,10,10,0.75); padding: 3px 8px;
            pointer-events: none;
        }

        /* ── Chart tooltip ── */
        #chart-tip {
            position: fixed;
            background: #fff;
            color: #000;
            padding: 8px 11px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 10px;
            pointer-events: none;
            display: none;
            z-index: 9000;
            border: 1px solid #ddd;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            max-width: 210px;
            line-height: 1.4;
        }

        /* Leaflet overrides */
        .leaflet-tooltip { font-family: 'IBM Plex Mono', monospace; font-size: 10px; font-weight: 600; background: rgba(0,0,0,0.82); color: #fff; border: none; border-radius: 0; padding: 4px 8px; box-shadow: none; max-width: 180px; white-space: normal; line-height: 1.4; }
        .leaflet-tooltip::before { display: none; }
    </style>
</head>
<body>

<div id="app">
    <div id="map"></div>
</div>

<div id="legend"></div>
<div id="basemap-badge">Modern map</div>

<!-- Map marker detail panel -->
<div id="detail">
    <div class="d-accent" id="d-accent"></div>
    <div class="d-wrap">
        <div class="d-top">
            <div class="d-badge" id="d-badge"></div>
            <button class="d-close" id="d-close">×</button>
        </div>
        <div class="d-year"   id="d-year"></div>
        <div class="d-title"  id="d-title"></div>
        <div class="d-sub"    id="d-sub"></div>
        <div class="d-rule"></div>
        <div class="d-text"   id="d-text"></div>
        <div class="d-cite"   id="d-cite"></div>
        <div class="d-sources" id="d-sources"></div>
    </div>
</div>

<!-- 2D Timeline Chart -->
<div id="chart">
    <div id="chart-hud">
        <span id="chart-year">1600</span>
        <span id="chart-era">Pre-1890 · Preconditions</span>
    </div>
    <svg id="chart-svg" style="cursor:crosshair;"></svg>
</div>

<!-- Dot tooltip -->
<div id="chart-tip"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>

/* ── Types ── */
const TYPE_MAP = { Organizing:'Organizing', Policy:'Government', Demographic:'Migration', Cultural:'Organizing', Infrastructure:'Government', Crisis:'Crisis', Displacement:'Displacement' };
const TYPE_OVERRIDES = { 34:'Organizing', 44:'Displacement' };
const TYPE_COLORS = { Organizing:'#27AE60', Government:'#2980B9', Migration:'#8E44AD', Crisis:'#C0392B', Displacement:'#E67E22' };
function resolveType(ev) { return TYPE_OVERRIDES[ev.id] || TYPE_MAP[ev.type] || ev.type; }

/* ── Eras ── */
const ERAS = [
    { name:'Preconditions',         range:'Pre-1890',     end:1889 },
    { name:'Form Emerges',          range:'1890–1930',    end:1929 },
    { name:'Racial Transition',     range:'1930–1960',    end:1959 },
    { name:'Self-Determination',    range:'1960–1980',    end:1979 },
    { name:'Crisis & Retrenchment', range:'1980–2000',    end:1999 },
    { name:'Gentrification Era',    range:'2000–present', end:9999 },
];
function eraForYear(y) { return ERAS.find(e => y <= e.end) || ERAS[ERAS.length-1]; }

/* ── Scope axis (top = broadest, bottom = most local) ── */
const SCOPE_ORDER = ['Federal', 'Regional', 'Citywide', 'Neighborhood', 'Block'];

/* ── Spatial detection ── */
const GENERIC = [
    {lat:40.6872, lng:-73.9418},
    {lat:40.6782, lng:-73.9442},
    {lat:40.7128, lng:-74.006},
];
function isSpatial(ev) {
    return !GENERIC.some(g => Math.abs(ev.lat - g.lat) < 0.0005 && Math.abs(ev.lng - g.lng) < 0.0005);
}

/* ── Basemaps — each entry shows from its implied start year until the next entry's before year ── */
const BASEMAPS = [
    { before:1807, urls:['https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png'],
      label:'Pre-map era', attr:'© CartoDB' },
    { before:1859, urls:['https://mapwarper.net/maps/tile/77083/{z}/{x}/{y}.png'],
      label:'Manhattan 1807', attr:'Mapwarper' },
    { before:1874, urls:['https://mapwarper.net/maps/tile/77083/{z}/{x}/{y}.png',
                         'https://mapwarper.net/maps/tile/85191/{z}/{x}/{y}.png'],
      label:'Historical · 1807 + 1859', attr:'Mapwarper' },
    { before:1891, urls:['https://mapwarper.net/maps/tile/77083/{z}/{x}/{y}.png',
                         'https://mapwarper.net/maps/tile/85191/{z}/{x}/{y}.png',
                         'https://mapwarper.net/maps/tile/104138/{z}/{x}/{y}.png'],
      label:'Historical · 1807–1874', attr:'Mapwarper' },
    { before:1905, urls:['https://mapwarper.net/maps/tile/77083/{z}/{x}/{y}.png',
                         'https://mapwarper.net/maps/tile/85191/{z}/{x}/{y}.png',
                         'https://mapwarper.net/maps/tile/104138/{z}/{x}/{y}.png',
                         'https://mapwarper.net/maps/tile/34125/{z}/{x}/{y}.png'],
      label:'Historical · 1807–1891', attr:'Mapwarper' },
    { before:1924, urls:['https://mapwarper.net/maps/tile/77083/{z}/{x}/{y}.png',
                         'https://mapwarper.net/maps/tile/85191/{z}/{x}/{y}.png',
                         'https://mapwarper.net/maps/tile/104138/{z}/{x}/{y}.png',
                         'https://mapwarper.net/maps/tile/34125/{z}/{x}/{y}.png',
                         'https://mapwarper.net/maps/tile/85456/{z}/{x}/{y}.png',
                         'https://mapwarper.net/maps/tile/85457/{z}/{x}/{y}.png',
                         'https://mapwarper.net/maps/tile/85458/{z}/{x}/{y}.png'],
      label:'Historical · 1807–1905', attr:'Mapwarper' },
    { before:1938, urls:['https://maps.nyc.gov/xyz/1.0.0/photo/1924/{z}/{x}/{y}.png8'],
      label:'1924 aerial', attr:'NYC DoITT' },
    { before:1951, urls:['https://mapwarper.net/maps/tile/82146/{z}/{x}/{y}.png'],
      label:'Brooklyn 1938', attr:'Mapwarper' },
    { before:1996, urls:['https://maps.nyc.gov/xyz/1.0.0/photo/1951/{z}/{x}/{y}.png8'],
      label:'1951 aerial', attr:'NYC DoITT' },
    { before:2004, urls:['https://maps.nyc.gov/xyz/1.0.0/photo/1996/{z}/{x}/{y}.png8'],
      label:'1996 aerial', attr:'NYC DoITT' },
    { before:2006, urls:['https://maps.nyc.gov/xyz/1.0.0/photo/2004/{z}/{x}/{y}.png8'],
      label:'2004 aerial', attr:'NYC DoITT' },
    { before:2008, urls:['https://maps.nyc.gov/xyz/1.0.0/photo/2006/{z}/{x}/{y}.png8'],
      label:'2006 aerial', attr:'NYC DoITT' },
    { before:2010, urls:['https://maps.nyc.gov/xyz/1.0.0/photo/2008/{z}/{x}/{y}.png8'],
      label:'2008 aerial', attr:'NYC DoITT' },
    { before:2012, urls:['https://maps.nyc.gov/xyz/1.0.0/photo/2010/{z}/{x}/{y}.png8'],
      label:'2010 aerial', attr:'NYC DoITT' },
    { before:2014, urls:['https://maps.nyc.gov/xyz/1.0.0/photo/2012/{z}/{x}/{y}.png8'],
      label:'2012 aerial', attr:'NYC DoITT' },
    { before:2016, urls:['https://maps.nyc.gov/xyz/1.0.0/photo/2014/{z}/{x}/{y}.png8'],
      label:'2014 aerial', attr:'NYC DoITT' },
    { before:2018, urls:['https://maps.nyc.gov/xyz/1.0.0/photo/2016/{z}/{x}/{y}.png8'],
      label:'2016 aerial', attr:'NYC DoITT' },
    { before:2019, urls:['https://maps.nyc.gov/xyz/1.0.0/photo/2018/{z}/{x}/{y}.png8'],
      label:'2018 aerial', attr:'NYC DoITT' },
    { before:9999, urls:['https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'],
      label:'Current satellite', attr:'© Esri, Maxar' },
];

/* ── Map ── */
const map = L.map('map', { center:[40.686, -73.945], zoom:13, zoomControl:true });
const streetLabels = L.tileLayer(
    'https://{s}.basemaps.cartocdn.com/dark_only_labels/{z}/{x}/{y}{r}.png',
    { maxZoom:19, zIndex:500, opacity:1, pane:'overlayPane' }
);
let activeBases = [];
let activeSpecBefore = null;
function setBasemap(year) {
    const spec = BASEMAPS.find(b => year < b.before);
    if (activeSpecBefore === spec.before) return;
    activeSpecBefore = spec.before;
    activeBases.forEach(l => map.removeLayer(l));
    activeBases = spec.urls.map(url => {
        const l = L.tileLayer(url, { maxZoom:19, attribution:spec.attr });
        l.addTo(map);
        return l;
    });
    streetLabels.bringToFront();
    document.getElementById('basemap-badge').textContent = spec.label;
}
setBasemap(1600);
streetLabels.addTo(map);

/* ── Jitter (for map markers only) ── */
function applyJitter(events) {
    const groups = {};
    events.forEach(ev => {
        const k = `${ev.lat.toFixed(3)},${ev.lng.toFixed(3)}`;
        (groups[k] = groups[k] || []).push(ev);
    });
    events.forEach(ev => {
        const g = groups[`${ev.lat.toFixed(3)},${ev.lng.toFixed(3)}`];
        if (g.length === 1) { ev._lat = ev.lat; ev._lng = ev.lng; return; }
        const i = g.indexOf(ev), angle = 2*Math.PI*i/g.length, r = 0.0013;
        ev._lat = ev.lat + r*Math.sin(angle);
        ev._lng = ev.lng + r*Math.cos(angle);
    });
}

/* ── Map markers (spatial events only) ── */
const mapMarkers = new Map();
function updateMapMarkers(year, events) {
    events.filter(isSpatial).forEach(ev => {
        const evYear = parseInt(ev.year, 10);
        const has = mapMarkers.has(ev.id);
        if (evYear <= year && !has) {
            const color = TYPE_COLORS[resolveType(ev)] || '#888';
            const m = L.circleMarker([ev._lat, ev._lng], {
                radius:8, fillColor:color, color:'transparent', weight:0, fillOpacity:0.85
            });
            m.bindTooltip(ev.title, { direction:'top', offset:[0,-10] });
            m.on('click', () => showDetail(ev, color));
            m.addTo(map);
            mapMarkers.set(ev.id, m);
        } else if (evYear > year && has) {
            map.removeLayer(mapMarkers.get(ev.id));
            mapMarkers.delete(ev.id);
        }
    });
}

/* ── Detail panel ── */
function escH(s) { return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function buildSrcs(raw, evId) {
    if (!raw) return '<div style="font-size:9px;color:#ccc;font-style:italic">No linked source</div>';
    return raw.split(/\s*\|\s*/).filter(Boolean).map((url, i) => {
        const label = `Read Source${raw.includes('|') ? ' '+(i+1) : ''} ↗`;
        const canEmbed = url.includes('.pdf') || url.includes('ourstuyheights') || url.includes('nypl.org') || url.includes('citizensnyc.org');
        const pid = `pv-${evId}-${i}`;
        let h = `<a href="${escH(url)}" target="_blank" rel="noopener" class="src-btn">${label}</a>`;
        if (canEmbed) h += `<button class="preview-toggle" onclick="togglePrev('${pid}')">Preview ▾</button><div class="preview-wrap" id="${pid}"><iframe src="${escH(url)}" loading="lazy" sandbox="allow-scripts allow-same-origin allow-forms"></iframe></div>`;
        return h;
    }).join('');
}

function togglePrev(id) {
    const el = document.getElementById(id);
    if (!el) return;
    el.previousElementSibling.textContent = el.classList.toggle('open') ? 'Preview ▴' : 'Preview ▾';
}

function showDetail(ev, color) {
    document.getElementById('d-accent').style.background = color;
    document.getElementById('d-badge').textContent = resolveType(ev);
    document.getElementById('d-badge').style.background = color;
    document.getElementById('d-year').textContent  = ev.date;
    document.getElementById('d-title').textContent = ev.title;
    document.getElementById('d-sub').textContent   = ev.subtitle || '';
    document.getElementById('d-text').textContent  = ev.body;
    document.getElementById('d-cite').textContent  = ev.citation ? 'Source: '+ev.citation : '';
    document.getElementById('d-sources').innerHTML = buildSrcs(ev.source_url, ev.id);
    document.getElementById('detail').classList.add('open');
}
document.getElementById('d-close').addEventListener('click', () => document.getElementById('detail').classList.remove('open'));

/* ── Legend ── */
function buildLegend() {
    const el = document.getElementById('legend');
    Object.entries(TYPE_COLORS).forEach(([type, color]) => {
        const row = document.createElement('div');
        row.className = 'leg-row';
        row.innerHTML = `<div class="leg-dot" style="background:${color}"></div><span class="leg-label">${type}</span>`;
        el.appendChild(row);
    });
}

/* ── Chart constants ── */
const MIN_YEAR   = 1600, MAX_YEAR = 2026;
const BREAK_YEAR = 1890;
const BREAK_FRAC = 0.18;  // 1600–1890 gets 18% of inner width (6 events)
const CHART_H    = 190;
const PAD        = { top: 34, bottom: 29, left: 100, right: 20 };

let cIW = 0;  // computed inner width
let playheadEl = null;
let allEvents  = [];

const chartSvg = document.getElementById('chart-svg');
const tip      = document.getElementById('chart-tip');

function yearToX(year) {
    if (year <= BREAK_YEAR) {
        return PAD.left + (year - MIN_YEAR) / (BREAK_YEAR - MIN_YEAR) * BREAK_FRAC * cIW;
    }
    return PAD.left + BREAK_FRAC * cIW + (year - BREAK_YEAR) / (MAX_YEAR - BREAK_YEAR) * (1 - BREAK_FRAC) * cIW;
}
function xToYear(px) {
    const t = (px - PAD.left) / cIW;
    if (t <= BREAK_FRAC) {
        return Math.round(MIN_YEAR + t / BREAK_FRAC * (BREAK_YEAR - MIN_YEAR));
    }
    return Math.round(BREAK_YEAR + (t - BREAK_FRAC) / (1 - BREAK_FRAC) * (MAX_YEAR - BREAK_YEAR));
}
function scopeToY(scope) {
    const i = SCOPE_ORDER.indexOf(scope);
    const idx = i < 0 ? 3 : i;
    return PAD.top + idx * (CHART_H - PAD.top - PAD.bottom) / (SCOPE_ORDER.length - 1);
}

const SVG_NS = 'http://www.w3.org/2000/svg';
function mk(tag, attrs) {
    const el = document.createElementNS(SVG_NS, tag);
    Object.entries(attrs).forEach(([k,v]) => el.setAttribute(k, v));
    return el;
}

function buildChart(events) {
    cIW = chartSvg.clientWidth - PAD.left - PAD.right;
    chartSvg.innerHTML = '';

    const iH = CHART_H - PAD.top - PAD.bottom;

    // Invisible drag surface
    const bg = mk('rect', { x: PAD.left, y: PAD.top, width: cIW, height: iH, fill: 'transparent' });
    chartSvg.appendChild(bg);

    // Y axis: horizontal rules + labels
    SCOPE_ORDER.forEach(scope => {
        const y = scopeToY(scope);
        chartSvg.appendChild(mk('line', { x1: PAD.left, y1: y, x2: PAD.left + cIW, y2: y, stroke: '#2a2a2a', 'stroke-width': 1 }));
        const lbl = mk('text', { x: PAD.left - 9, y: y + 4, 'text-anchor': 'end', 'font-family': 'IBM Plex Mono,monospace', 'font-size': 10, fill: '#bbb', 'letter-spacing': '0.05em' });
        lbl.textContent = scope.toUpperCase();
        chartSvg.appendChild(lbl);
    });

    // X axis: era-boundary ticks + year labels
    [1600, 1890, 1930, 1960, 1980, 2000, 2026].forEach(year => {
        const x = yearToX(year);
        const isBreak = year === BREAK_YEAR;
        chartSvg.appendChild(mk('line', {
            x1: x, y1: PAD.top, x2: x, y2: PAD.top + iH,
            stroke: isBreak ? '#2a2a2a' : '#131313',
            'stroke-width': isBreak ? 1 : 0.75,
            'stroke-dasharray': isBreak ? '' : '2 5'
        }));
        const lbl = mk('text', { x, y: CHART_H - PAD.bottom + 16, 'text-anchor': 'middle', 'font-family': 'IBM Plex Mono,monospace', 'font-size': 10, fill: isBreak ? '#ccc' : '#777' });
        lbl.textContent = year;
        chartSvg.appendChild(lbl);
    });

    // Scale-break indicator: small zigzag at 1890 boundary
    const bx = yearToX(BREAK_YEAR);
    const zPath = `M${bx-2},${PAD.top} l4,-5 l-4,5 l4,-5`;
    chartSvg.appendChild(mk('path', { d: zPath, stroke: '#333', 'stroke-width': 1, fill: 'none' }));

    // Event dots — halo + filled dot, community-resource-map style
    events.forEach(ev => {
        const type  = resolveType(ev);
        const color = TYPE_COLORS[type] || '#7F8C8D';
        const x     = yearToX(parseInt(ev.year, 10));
        const y     = scopeToY(ev.scope || 'Neighborhood');

        // Halo (larger, very transparent)
        const halo = mk('circle', { cx: x, cy: y, r: 11, fill: color, stroke: 'none', opacity: 0.05, 'data-halo': ev.id });
        halo.style.pointerEvents = 'none';
        chartSvg.appendChild(halo);

        // Main dot
        const dot = mk('circle', { cx: x, cy: y, r: 6, fill: color, stroke: 'none', 'stroke-width': 0, opacity: 0.13 });
        dot.style.cursor = 'pointer';
        dot.dataset.id   = ev.id;

        dot.addEventListener('mouseenter', e => {
            tip.innerHTML = `<div style="font-size:8px;color:#999;margin-bottom:3px">${ev.year} &nbsp;·&nbsp; ${ev.scope || ''}</div><div style="font-weight:600;line-height:1.35;color:#000">${ev.title}</div>`;
            tip.style.display = 'block';
            tip.style.left = (e.clientX + 14) + 'px';
            tip.style.top  = (e.clientY - 32) + 'px';
            dot.setAttribute('r', 9);
            dot.setAttribute('stroke', '#ffffff');
            dot.setAttribute('stroke-width', 2);
        });
        dot.addEventListener('mousemove', e => {
            tip.style.left = (e.clientX + 14) + 'px';
            tip.style.top  = (e.clientY - 32) + 'px';
        });
        dot.addEventListener('mouseleave', () => {
            tip.style.display = 'none';
            dot.setAttribute('r', 6);
            dot.setAttribute('stroke', 'none');
            dot.setAttribute('stroke-width', 0);
        });
        dot.addEventListener('click', e => {
            e.stopPropagation();
            showDetail(ev, color);
            if (isSpatial(ev)) map.flyTo([ev._lat, ev._lng], Math.max(map.getZoom(), 15), { duration: 0.7 });
        });

        chartSvg.appendChild(dot);
    });

    // Playhead line (drawn last so it sits above dots)
    playheadEl = mk('line', {
        x1: yearToX(MIN_YEAR), y1: PAD.top - 5,
        x2: yearToX(MIN_YEAR), y2: CHART_H - PAD.bottom + 5,
        stroke: 'rgba(255,255,255,0.75)', 'stroke-width': 1.5
    });
    playheadEl.style.pointerEvents = 'none';
    chartSvg.appendChild(playheadEl);

    // Drag interaction: mousedown on non-dot → drag to scrub
    let dragging = false;
    chartSvg.addEventListener('mousedown', e => {
        if (!e.target.dataset.id) { dragging = true; scrubTo(e); }
    });
    chartSvg.addEventListener('mousemove', e => {
        if (dragging) scrubTo(e);
    });
    window.addEventListener('mouseup', () => { dragging = false; });

    // Touch support
    chartSvg.addEventListener('touchstart', e => { dragging = true; scrubTo(e.touches[0]); }, { passive: true });
    chartSvg.addEventListener('touchmove',  e => { if (dragging) scrubTo(e.touches[0]); }, { passive: true });
    window.addEventListener('touchend', () => { dragging = false; });
}

function scrubTo(e) {
    const rect = chartSvg.getBoundingClientRect();
    const year = Math.max(MIN_YEAR, Math.min(MAX_YEAR, xToYear(e.clientX - rect.left)));
    setYear(year);
}

function setYear(year) {
    // Move playhead
    const x = yearToX(year);
    playheadEl.setAttribute('x1', x);
    playheadEl.setAttribute('x2', x);

    // Update dot and halo visibility
    chartSvg.querySelectorAll('circle[data-id]').forEach(dot => {
        const ev = allEvents.find(e => e.id === parseInt(dot.dataset.id));
        if (!ev) return;
        const past = parseInt(ev.year, 10) <= year;
        dot.setAttribute('opacity', past ? '0.85' : '0.13');
        const halo = chartSvg.querySelector(`circle[data-halo="${ev.id}"]`);
        if (halo) halo.setAttribute('opacity', past ? '0.15' : '0.05');
    });

    // HUD
    const era = eraForYear(year);
    document.getElementById('chart-year').textContent = year;
    document.getElementById('chart-era').textContent  = `${era.range} · ${era.name}`;

    // Map
    updateMapMarkers(year, allEvents);
    setBasemap(year);
}

/* ── Boot ── */
fetch('data/ba_timeline.json')
    .then(r => r.json())
    .then(data => {
        allEvents = data;
        applyJitter(allEvents);
        buildLegend();
        buildChart(allEvents);
        setYear(MIN_YEAR);
    })
    .catch(err => console.error('Timeline load failed:', err));

// Rebuild on resize
let resizeTimer;
window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => { if (allEvents.length) buildChart(allEvents); }, 180);
});

</script>
</body>
</html>
