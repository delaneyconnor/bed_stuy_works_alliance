<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BA History — Bed-Stuy Works Alliance</title>
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.0.1/mapbox-gl.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; font-family: 'IBM Plex Mono', monospace; background: #0a0a0a; }

        /* ── Root layout ── */
        #layout {
            display: flex;
            flex-direction: row;
            height: 100vh;
            width: 100vw;
            --split: 320px;
        }

        /* ── Timeline panel ── */
        #timeline-panel {
            width: var(--split);
            height: 100%;
            overflow-y: scroll;
            overflow-x: hidden;
            background: #080808;
            flex-shrink: 0;
            scrollbar-width: thin;
            scrollbar-color: #222 transparent;
        }

        /* Sticky year/era header */
        #tl-hud {
            position: sticky;
            top: 0;
            z-index: 10;
            background: #080808;
            border-bottom: 1px solid #1a1a1a;
            padding: 14px 16px 11px;
        }
        #tl-year {
            font-size: 30px;
            font-weight: 600;
            color: #fff;
            line-height: 1;
            display: block;
        }
        #tl-era {
            font-size: 9px;
            color: #555;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            display: block;
            margin-top: 5px;
        }

        /* Era section header */
        .era-header {
            padding: 22px 16px 7px;
            border-bottom: 1px solid #111;
        }
        .era-name {
            font-size: 8px;
            font-weight: 600;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: #444;
        }
        .era-range {
            font-size: 10px;
            color: #2a2a2a;
            margin-top: 2px;
        }

        /* Event row */
        .tl-event {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 9px 16px;
            cursor: pointer;
            transition: background 0.1s;
            border-bottom: 1px solid #0e0e0e;
        }
        .tl-event:hover { background: #111; }

        .tl-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            flex-shrink: 0;
            margin-top: 5px;
            opacity: 0.15;
            transition: opacity 0.25s;
        }
        .tl-event.past .tl-dot  { opacity: 0.75; }
        .tl-event.active .tl-dot { opacity: 1; }

        .tl-meta { flex: 1; min-width: 0; }

        .tl-event-year {
            font-size: 8px;
            color: #2a2a2a;
            letter-spacing: 0.06em;
            display: block;
            transition: color 0.25s;
        }
        .tl-event.past   .tl-event-year  { color: #555; }
        .tl-event.active .tl-event-year  { color: #999; }

        .tl-event-title {
            font-size: 11px;
            color: #1e1e1e;
            line-height: 1.4;
            display: block;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: color 0.25s;
        }
        .tl-event.past   .tl-event-title { color: #888; }
        .tl-event.active .tl-event-title { color: #fff; font-weight: 600; white-space: normal; }

        /* Padding so last events can scroll into view */
        #tl-footer { height: 80vh; }

        /* ── Draggable divider ── */
        #divider {
            width: 5px;
            height: 100%;
            background: #0f0f0f;
            cursor: col-resize;
            flex-shrink: 0;
            position: relative;
            z-index: 100;
            transition: background 0.15s;
        }
        #divider:hover, #divider.dragging { background: #222; }
        #divider::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 1px;
            height: 36px;
            background: #2a2a2a;
        }

        /* ── Map panel ── */
        #map-panel {
            flex: 1;
            height: 100%;
            position: relative;
            min-width: 300px;
        }
        #map { width: 100%; height: 100%; }

        .mapboxgl-ctrl-top-right { top: 4px !important; }
        .mapboxgl-ctrl-bottom-right { bottom: 8px !important; }
        .mapboxgl-ctrl-bottom-left  { bottom: 8px !important; }

        /* ── Detail panel (slides in from left of map panel) ── */
        #detail {
            position: absolute;
            top: 12px;
            left: -380px;
            width: 340px;
            max-height: calc(100% - 24px);
            background: #fff;
            color: #000;
            z-index: 2000;
            overflow-y: auto;
            transition: left 0.35s cubic-bezier(0.16, 1, 0.3, 1);
            scrollbar-width: thin;
        }
        #detail.open { left: 12px; }

        .d-accent   { height: 4px; }
        .d-wrap     { padding: 16px 18px 22px; }
        .d-top      { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 11px; }
        .d-badge    { font-size: 8px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: #fff; padding: 4px 8px; }
        .d-close    { background: none; border: none; font-size: 18px; cursor: pointer; color: #ccc; font-family: inherit; line-height: 1; padding: 2px; }
        .d-close:hover { color: #000; }
        .d-year     { font-size: 10px; color: #aaa; letter-spacing: 0.06em; margin-bottom: 4px; }
        .d-title    { font-size: 15px; font-weight: 600; line-height: 1.3; margin-bottom: 5px; }
        .d-sub      { font-size: 11px; color: #777; font-style: italic; line-height: 1.5; margin-bottom: 12px; }
        .d-rule     { height: 1px; background: #f0f0f0; margin-bottom: 12px; }
        .d-text     { font-size: 11px; line-height: 1.8; color: #333; font-weight: 300; margin-bottom: 14px; }
        .d-cite     { font-size: 9px; color: #bbb; font-style: italic; margin-bottom: 12px; line-height: 1.5; }
        .d-sources  { display: flex; flex-direction: column; gap: 6px; }
        .src-btn    { display: block; font-family: inherit; font-size: 9px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; text-decoration: none; color: #000; border: 1.5px solid #000; padding: 7px 12px; text-align: center; transition: background 0.15s, color 0.15s; }
        .src-btn:hover { background: #000; color: #fff; }
        .preview-toggle { font-family: inherit; font-size: 9px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; color: #aaa; background: none; border: 1.5px solid #e0e0e0; padding: 7px 12px; width: 100%; transition: border-color 0.15s, color 0.15s; }
        .preview-toggle:hover { border-color: #000; color: #000; }
        .preview-wrap { display: none; margin-top: 6px; }
        .preview-wrap.open { display: block; }
        .preview-wrap iframe { width: 100%; height: 240px; border: 1px solid #e0e0e0; display: block; }

        /* ── Legend ── */
        #legend {
            position: absolute;
            top: 12px; right: 12px;
            z-index: 999;
            background: rgba(10,10,10,0.82);
            padding: 9px 12px;
            display: flex; flex-direction: column; gap: 5px;
            pointer-events: none;
        }
        .leg-row   { display: flex; align-items: center; gap: 7px; }
        .leg-dot   { width: 9px; height: 9px; border-radius: 50%; border: 1.5px solid rgba(255,255,255,0.2); flex-shrink: 0; }
        .leg-label { font-size: 8px; letter-spacing: 0.08em; text-transform: uppercase; color: #bbb; }

        #basemap-badge {
            position: absolute;
            bottom: 12px; left: 12px;
            z-index: 999;
            font-size: 8px; letter-spacing: 0.08em; text-transform: uppercase;
            color: #999; background: #0a0a0a; padding: 3px 8px;
            pointer-events: none;
        }

        /* ── Map tooltip ── */
        #map-tip {
            position: fixed;
            background: #fff;
            color: #000;
            padding: 8px 11px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 10px;
            pointer-events: none;
            display: none;
            z-index: 9000;
            border: 1px solid #ddd;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            max-width: 210px;
            line-height: 1.4;
        }
    </style>
</head>
<body>

<div id="layout">

    <!-- Left: vertical scrollable timeline -->
    <div id="timeline-panel">
        <div id="tl-hud">
            <span id="tl-year">1600</span>
            <span id="tl-era">Pre-1890 · Preconditions</span>
        </div>
        <div id="tl-body"></div>
        <div id="tl-footer"></div>
    </div>

    <!-- Draggable divider bar -->
    <div id="divider"></div>

    <!-- Right: map -->
    <div id="map-panel">
        <div id="map"></div>
        <div id="legend"></div>
        <div id="basemap-badge">Modern map</div>

        <div id="detail">
            <div class="d-accent" id="d-accent"></div>
            <div class="d-wrap">
                <div class="d-top">
                    <div class="d-badge" id="d-badge"></div>
                    <button class="d-close" id="d-close">×</button>
                </div>
                <div class="d-year"    id="d-year"></div>
                <div class="d-title"   id="d-title"></div>
                <div class="d-sub"     id="d-sub"></div>
                <div class="d-rule"></div>
                <div class="d-text"    id="d-text"></div>
                <div class="d-cite"    id="d-cite"></div>
                <div class="d-sources" id="d-sources"></div>
            </div>
        </div>
    </div>
</div>

<div id="map-tip"></div>

<script src="https://api.mapbox.com/mapbox-gl-js/v3.0.1/mapbox-gl.js"></script>
<script>

/* ── Types ── */
const TYPE_MAP = { Organizing:'Organizing', Policy:'Government', Demographic:'Migration', Cultural:'Organizing', Infrastructure:'Government', Crisis:'Crisis', Displacement:'Displacement' };
const TYPE_OVERRIDES = { 34:'Organizing', 44:'Displacement' };
const TYPE_COLORS = { Organizing:'#27AE60', Government:'#2980B9', Migration:'#8E44AD', Crisis:'#C0392B', Displacement:'#E67E22' };
function resolveType(ev) { return TYPE_OVERRIDES[ev.id] || TYPE_MAP[ev.type] || ev.type; }

/* ── Eras ── */
const ERAS = [
    { name:'Preconditions',         range:'Pre-1890',     end:1889 },
    { name:'Form Emerges',          range:'1890–1930',    end:1929 },
    { name:'Racial Transition',     range:'1930–1960',    end:1959 },
    { name:'Self-Determination',    range:'1960–1980',    end:1979 },
    { name:'Crisis & Retrenchment', range:'1980–2000',    end:1999 },
    { name:'Gentrification Era',    range:'2000–present', end:9999 },
];
function eraForYear(y) { return ERAS.find(e => y <= e.end) || ERAS[ERAS.length - 1]; }

/* ── Spatial detection ── */
const GENERIC = [
    { lat:40.6872, lng:-73.9418 },
    { lat:40.6782, lng:-73.9442 },
    { lat:40.7128, lng:-74.006  },
];
function isSpatial(ev) {
    return !GENERIC.some(g => Math.abs(ev.lat - g.lat) < 0.0005 && Math.abs(ev.lng - g.lng) < 0.0005);
}

/* ── Basemaps ── */
const BASEMAPS = [
    { before:1800, urls:['https://a.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}.png'],
      label:'Pre-map era' },
    { before:1807, urls:['https://mapwarper.net/maps/tile/47170/{z}/{x}/{y}.png'],
      label:'Brooklyn 1800' },
    { before:1855, urls:['https://mapwarper.net/maps/tile/47170/{z}/{x}/{y}.png',
                         'https://mapwarper.net/maps/tile/77083/{z}/{x}/{y}.png'],
      label:'Historical · 1800 + 1807' },
    { before:1859, urls:['https://mapwarper.net/maps/tile/47170/{z}/{x}/{y}.png',
                         'https://mapwarper.net/maps/tile/77083/{z}/{x}/{y}.png',
                         'https://mapwarper.net/maps/tile/94912/{z}/{x}/{y}.png'],
      label:'Historical · 1807 + 1855' },
    { before:1869, urls:['https://mapwarper.net/maps/tile/47170/{z}/{x}/{y}.png',
                         'https://mapwarper.net/maps/tile/77083/{z}/{x}/{y}.png',
                         'https://mapwarper.net/maps/tile/94912/{z}/{x}/{y}.png',
                         'https://mapwarper.net/maps/tile/85191/{z}/{x}/{y}.png',
                         'https://mapwarper.net/maps/tile/11048/{z}/{x}/{y}.png'],
      label:'Historical · 1800–1868' },
    { before:1874, urls:['https://mapwarper.net/maps/tile/47170/{z}/{x}/{y}.png',
                         'https://mapwarper.net/maps/tile/77083/{z}/{x}/{y}.png',
                         'https://mapwarper.net/maps/tile/94912/{z}/{x}/{y}.png',
                         'https://mapwarper.net/maps/tile/85191/{z}/{x}/{y}.png',
                         'https://mapwarper.net/maps/tile/11048/{z}/{x}/{y}.png',
                         'https://mapwarper.net/maps/tile/78380/{z}/{x}/{y}.png'],
      label:'Historical · 1800–1869' },
    { before:1891, urls:['https://mapwarper.net/maps/tile/47170/{z}/{x}/{y}.png',
                         'https://mapwarper.net/maps/tile/77083/{z}/{x}/{y}.png',
                         'https://mapwarper.net/maps/tile/85191/{z}/{x}/{y}.png',
                         'https://mapwarper.net/maps/tile/11048/{z}/{x}/{y}.png',
                         'https://mapwarper.net/maps/tile/78380/{z}/{x}/{y}.png',
                         'https://mapwarper.net/maps/tile/104138/{z}/{x}/{y}.png'],
      label:'Historical · 1800–1874' },
    { before:1905, urls:['https://mapwarper.net/maps/tile/47170/{z}/{x}/{y}.png',
                         'https://mapwarper.net/maps/tile/77083/{z}/{x}/{y}.png',
                         'https://mapwarper.net/maps/tile/85191/{z}/{x}/{y}.png',
                         'https://mapwarper.net/maps/tile/11048/{z}/{x}/{y}.png',
                         'https://mapwarper.net/maps/tile/78380/{z}/{x}/{y}.png',
                         'https://mapwarper.net/maps/tile/104138/{z}/{x}/{y}.png',
                         'https://mapwarper.net/maps/tile/34125/{z}/{x}/{y}.png'],
      label:'Historical · 1800–1891' },
    { before:1917, urls:['https://mapwarper.net/maps/tile/47170/{z}/{x}/{y}.png',
                         'https://mapwarper.net/maps/tile/77083/{z}/{x}/{y}.png',
                         'https://mapwarper.net/maps/tile/85191/{z}/{x}/{y}.png',
                         'https://mapwarper.net/maps/tile/11048/{z}/{x}/{y}.png',
                         'https://mapwarper.net/maps/tile/78380/{z}/{x}/{y}.png',
                         'https://mapwarper.net/maps/tile/104138/{z}/{x}/{y}.png',
                         'https://mapwarper.net/maps/tile/34125/{z}/{x}/{y}.png',
                         'https://mapwarper.net/maps/tile/85456/{z}/{x}/{y}.png',
                         'https://mapwarper.net/maps/tile/85457/{z}/{x}/{y}.png',
                         'https://mapwarper.net/maps/tile/85458/{z}/{x}/{y}.png'],
      label:'Historical · 1800–1905' },
    { before:1924, urls:['https://mapwarper.net/maps/tile/47170/{z}/{x}/{y}.png',
                         'https://mapwarper.net/maps/tile/77083/{z}/{x}/{y}.png',
                         'https://mapwarper.net/maps/tile/85191/{z}/{x}/{y}.png',
                         'https://mapwarper.net/maps/tile/11048/{z}/{x}/{y}.png',
                         'https://mapwarper.net/maps/tile/78380/{z}/{x}/{y}.png',
                         'https://mapwarper.net/maps/tile/104138/{z}/{x}/{y}.png',
                         'https://mapwarper.net/maps/tile/34125/{z}/{x}/{y}.png',
                         'https://mapwarper.net/maps/tile/85456/{z}/{x}/{y}.png',
                         'https://mapwarper.net/maps/tile/85457/{z}/{x}/{y}.png',

                         'https://mapwarper.net/maps/tile/96360/{z}/{x}/{y}.png'],
      label:'Historical · 1800–1917' },
    { before:1938, urls:['https://maps.nyc.gov/xyz/1.0.0/photo/1924/{z}/{x}/{y}.png8'],
      label:'1924 aerial' },
    { before:1951, urls:['https://mapwarper.net/maps/tile/82146/{z}/{x}/{y}.png'],
      label:'Brooklyn 1938' },
    { before:1996, urls:['https://maps.nyc.gov/xyz/1.0.0/photo/1951/{z}/{x}/{y}.png8'],
      label:'1951 aerial' },
    { before:2004, urls:['https://maps.nyc.gov/xyz/1.0.0/photo/1996/{z}/{x}/{y}.png8'],
      label:'1996 aerial' },
    { before:2006, urls:['https://maps.nyc.gov/xyz/1.0.0/photo/2004/{z}/{x}/{y}.png8'],
      label:'2004 aerial' },
    { before:2008, urls:['https://maps.nyc.gov/xyz/1.0.0/photo/2006/{z}/{x}/{y}.png8'],
      label:'2006 aerial' },
    { before:2010, urls:['https://maps.nyc.gov/xyz/1.0.0/photo/2008/{z}/{x}/{y}.png8'],
      label:'2008 aerial' },
    { before:2012, urls:['https://maps.nyc.gov/xyz/1.0.0/photo/2010/{z}/{x}/{y}.png8'],
      label:'2010 aerial' },
    { before:2014, urls:['https://maps.nyc.gov/xyz/1.0.0/photo/2012/{z}/{x}/{y}.png8'],
      label:'2012 aerial' },
    { before:2016, urls:['https://maps.nyc.gov/xyz/1.0.0/photo/2014/{z}/{x}/{y}.png8'],
      label:'2014 aerial' },
    { before:2018, urls:['https://maps.nyc.gov/xyz/1.0.0/photo/2016/{z}/{x}/{y}.png8'],
      label:'2016 aerial' },
    { before:2019, urls:['https://maps.nyc.gov/xyz/1.0.0/photo/2018/{z}/{x}/{y}.png8'],
      label:'2018 aerial' },
    { before:9999, urls:['mapbox://mapbox.satellite'],
      label:'Current satellite' },
];

/* ── Map ── */
mapboxgl.accessToken = 'pk.eyJ1IjoiZGVsYW5leWNvbm5vciIsImEiOiJjbTRnM2Q1ZGkxZzhuMmpvbXByY2wwaDgwIn0.HSEo0pqv9ZN6DorMNmTB8A';
const map = new mapboxgl.Map({
    container: 'map',
    style: 'mapbox://styles/delaneyconnor/cmie08kl4000901s32neo2nsz',
    center: [-73.945, 40.686],
    zoom: 13
});
map.addControl(new mapboxgl.NavigationControl(), 'top-right');

let activeLayerIds = [], activeSourceIds = [], activeSpecBefore = null, layerCounter = 0, mapLoaded = false;
const tip = document.getElementById('map-tip');

map.on('load', () => {
    mapLoaded = true;

    map.addSource('events', { type:'geojson', data:{ type:'FeatureCollection', features:[] } });
    map.addLayer({
        id: 'events-layer', type: 'circle', source: 'events',
        paint: { 'circle-radius': 8, 'circle-color': ['get','color'], 'circle-opacity': 0.13, 'circle-stroke-width': 0 }
    });

    map.on('mouseenter', 'events-layer', e => {
        map.getCanvas().style.cursor = 'pointer';
        const p = e.features[0].properties;
        tip.innerHTML = `<div style="font-size:8px;color:#999;margin-bottom:3px">${p.date} &nbsp;·&nbsp; ${p.scope}</div><div style="font-weight:600;line-height:1.35">${p.title}</div>`;
        tip.style.display = 'block';
        posTip(e.originalEvent);
    });
    map.on('mousemove',  'events-layer', e => posTip(e.originalEvent));
    map.on('mouseleave', 'events-layer', () => { map.getCanvas().style.cursor = ''; tip.style.display = 'none'; });
    map.on('click',      'events-layer', e => {
        const id = e.features[0].properties.id;
        const ev = allEvents.find(x => x.id === id);
        if (!ev) return;
        const color = TYPE_COLORS[resolveType(ev)] || '#888';
        showDetail(ev, color);
        setYear(parseInt(ev.year, 10), true);
        map.flyTo({ center:[ev._lng, ev._lat], zoom:Math.max(map.getZoom(), 15), duration:700 });
    });

    if (allEvents.length) {
        loadEventsToMap(allEvents);
        setBasemap(MIN_YEAR);
        updateMapMarkers(MIN_YEAR);
    }
});

function posTip(e) { tip.style.left = (e.clientX + 14) + 'px'; tip.style.top = (e.clientY - 32) + 'px'; }

function buildEventsGeoJSON(events) {
    return {
        type: 'FeatureCollection',
        features: events.filter(isSpatial).map(ev => ({
            type: 'Feature',
            geometry: { type:'Point', coordinates:[ev._lng, ev._lat] },
            properties: {
                id: ev.id, year: parseInt(ev.year, 10),
                color: TYPE_COLORS[resolveType(ev)] || '#888',
                title: ev.title, scope: ev.scope || '',
                date: String(ev.date || ev.year)
            }
        }))
    };
}

function loadEventsToMap(events) {
    if (!mapLoaded || !map.getSource('events')) return;
    map.getSource('events').setData(buildEventsGeoJSON(events));
}

function setBasemap(year) {
    if (!mapLoaded) return;
    const spec = BASEMAPS.find(b => year < b.before);
    if (activeSpecBefore === spec.before) return;
    activeSpecBefore = spec.before;
    activeLayerIds.forEach(id => { try { map.removeLayer(id); } catch(e) {} });
    activeSourceIds.forEach(id => { try { map.removeSource(id); } catch(e) {} });
    activeLayerIds = []; activeSourceIds = [];
    const n = layerCounter++;
    spec.urls.forEach((url, i) => {
        const sid = `h-s-${n}-${i}`, lid = `h-l-${n}-${i}`;
        const src = url === 'mapbox://mapbox.satellite'
            ? { type:'raster', url:'mapbox://mapbox.satellite', tileSize:256 }
            : { type:'raster', tiles:[url], tileSize:256 };
        map.addSource(sid, src);
        map.addLayer({ id:lid, type:'raster', source:sid }, 'events-layer');
        activeLayerIds.push(lid); activeSourceIds.push(sid);
    });
    document.getElementById('basemap-badge').textContent = spec.label;
}

/* ── Jitter ── */
function applyJitter(events) {
    const groups = {};
    events.forEach(ev => {
        const k = `${ev.lat.toFixed(3)},${ev.lng.toFixed(3)}`;
        (groups[k] = groups[k] || []).push(ev);
    });
    events.forEach(ev => {
        const g = groups[`${ev.lat.toFixed(3)},${ev.lng.toFixed(3)}`];
        if (g.length === 1) { ev._lat = ev.lat; ev._lng = ev.lng; return; }
        const i = g.indexOf(ev), angle = 2 * Math.PI * i / g.length, r = 0.0013;
        ev._lat = ev.lat + r * Math.sin(angle);
        ev._lng = ev.lng + r * Math.cos(angle);
    });
}

/* ── Map markers ── */
function updateMapMarkers(year) {
    if (!mapLoaded || !map.getSource('events')) return;
    map.setPaintProperty('events-layer', 'circle-opacity',
        ['case', ['<=', ['get','year'], year], 0.85, 0.13]
    );
}

/* ── Detail panel ── */
function escH(s) { return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function buildSrcs(raw, evId) {
    if (!raw) return '<div style="font-size:9px;color:#ccc;font-style:italic">No linked source</div>';
    return raw.split(/\s*\|\s*/).filter(Boolean).map((url, i) => {
        const label = `Read Source${raw.includes('|') ? ' ' + (i + 1) : ''} ↗`;
        const canEmbed = url.includes('.pdf') || url.includes('ourstuyheights') || url.includes('nypl.org') || url.includes('citizensnyc.org');
        const pid = `pv-${evId}-${i}`;
        let h = `<a href="${escH(url)}" target="_blank" rel="noopener" class="src-btn">${label}</a>`;
        if (canEmbed) h += `<button class="preview-toggle" onclick="togglePrev('${pid}')">Preview ▾</button><div class="preview-wrap" id="${pid}"><iframe src="${escH(url)}" loading="lazy" sandbox="allow-scripts allow-same-origin allow-forms"></iframe></div>`;
        return h;
    }).join('');
}

function togglePrev(id) {
    const el = document.getElementById(id);
    if (!el) return;
    el.previousElementSibling.textContent = el.classList.toggle('open') ? 'Preview ▴' : 'Preview ▾';
}

function showDetail(ev, color) {
    document.getElementById('d-accent').style.background  = color;
    document.getElementById('d-badge').textContent        = resolveType(ev);
    document.getElementById('d-badge').style.background   = color;
    document.getElementById('d-year').textContent         = ev.date;
    document.getElementById('d-title').textContent        = ev.title;
    document.getElementById('d-sub').textContent          = ev.subtitle || '';
    document.getElementById('d-text').textContent         = ev.body;
    document.getElementById('d-cite').textContent         = ev.citation ? 'Source: ' + ev.citation : '';
    document.getElementById('d-sources').innerHTML        = buildSrcs(ev.source_url, ev.id);
    document.getElementById('detail').classList.add('open');
}
document.getElementById('d-close').addEventListener('click', () => document.getElementById('detail').classList.remove('open'));

/* ── Legend ── */
function buildLegend() {
    const el = document.getElementById('legend');
    Object.entries(TYPE_COLORS).forEach(([type, color]) => {
        const row = document.createElement('div');
        row.className = 'leg-row';
        row.innerHTML = `<div class="leg-dot" style="background:${color}"></div><span class="leg-label">${type}</span>`;
        el.appendChild(row);
    });
}

/* ── Timeline ── */
const MIN_YEAR = 1600, MAX_YEAR = 2026;
let allEvents = [];
let currentYear = MIN_YEAR;
let suppressScroll = false;

function buildTimeline(events) {
    const body = document.getElementById('tl-body');
    body.innerHTML = '';
    const sorted = [...events].sort((a, b) => parseInt(a.year) - parseInt(b.year));

    let lastEraEnd = -1;
    sorted.forEach(ev => {
        const era = eraForYear(parseInt(ev.year));
        if (era.end !== lastEraEnd) {
            lastEraEnd = era.end;
            const hdr = document.createElement('div');
            hdr.className = 'era-header';
            hdr.innerHTML = `<div class="era-name">${era.name}</div><div class="era-range">${era.range}</div>`;
            body.appendChild(hdr);
        }

        const color = TYPE_COLORS[resolveType(ev)] || '#888';
        const row   = document.createElement('div');
        row.className    = 'tl-event';
        row.dataset.year = ev.year;
        row.dataset.id   = ev.id;
        row.innerHTML = `
            <div class="tl-dot" style="background:${color}"></div>
            <div class="tl-meta">
                <span class="tl-event-year">${ev.date || ev.year}</span>
                <span class="tl-event-title">${ev.title}</span>
            </div>`;

        row.addEventListener('click', () => {
            setYear(parseInt(ev.year, 10), false);
            showDetail(ev, color);
            if (isSpatial(ev)) map.flyTo({ center:[ev._lng, ev._lat], zoom:Math.max(map.getZoom(), 15), duration:700 });
        });
        body.appendChild(row);
    });
}

function updateTimelineHighlight(year) {
    const rows = [...document.querySelectorAll('.tl-event')];
    let lastPast = null;
    rows.forEach(r => { if (parseInt(r.dataset.year) <= year) lastPast = r; });
    rows.forEach(r => {
        const y = parseInt(r.dataset.year);
        r.classList.toggle('past',   y <= year && r !== lastPast);
        r.classList.toggle('active', r === lastPast);
    });
    const era = eraForYear(year);
    document.getElementById('tl-year').textContent = year;
    document.getElementById('tl-era').textContent  = `${era.range} · ${era.name}`;
}

function scrollTimelineToYear(year) {
    const rows = [...document.querySelectorAll('.tl-event')];
    let target = null;
    rows.forEach(r => { if (parseInt(r.dataset.year) <= year) target = r; });
    if (!target && rows.length) target = rows[0];
    if (!target) return;
    suppressScroll = true;
    target.scrollIntoView({ block: 'center', behavior: 'smooth' });
    setTimeout(() => { suppressScroll = false; }, 700);
}

/* Scroll → year: topmost visible event row drives the year */
const tlPanel = document.getElementById('timeline-panel');
tlPanel.addEventListener('scroll', () => {
    if (suppressScroll) return;
    const hudBottom = document.getElementById('tl-hud').getBoundingClientRect().bottom;
    const rows = document.querySelectorAll('.tl-event');
    let topRow = null;
    for (const row of rows) {
        if (row.getBoundingClientRect().top >= hudBottom) { topRow = row; break; }
    }
    if (topRow) {
        const y = parseInt(topRow.dataset.year);
        if (y !== currentYear) setYear(y, false);
    }
});

/* ── setYear: single source of truth ── */
function setYear(year, scrollTL = true) {
    currentYear = year;
    updateTimelineHighlight(year);
    updateMapMarkers(year);
    setBasemap(year);
    if (scrollTL) scrollTimelineToYear(year);
}

/* ── Draggable divider ── */
const divider = document.getElementById('divider');
const layout  = document.getElementById('layout');
let dragging  = false;

divider.addEventListener('mousedown', e => {
    dragging = true;
    divider.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    e.preventDefault();
});
document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const x = Math.max(180, Math.min(window.innerWidth - 300, e.clientX));
    layout.style.setProperty('--split', x + 'px');
    map.resize();
});
document.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    divider.classList.remove('dragging');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
    map.resize();
});

divider.addEventListener('touchstart', e => { dragging = true; e.preventDefault(); }, { passive: false });
document.addEventListener('touchmove', e => {
    if (!dragging) return;
    const x = Math.max(180, Math.min(window.innerWidth - 300, e.touches[0].clientX));
    layout.style.setProperty('--split', x + 'px');
    map.resize();
}, { passive: true });
document.addEventListener('touchend', () => { if (dragging) { dragging = false; map.resize(); } });

/* ── Boot ── */
fetch('data/ba_timeline.json')
    .then(r => r.json())
    .then(data => {
        allEvents = data;
        applyJitter(allEvents);
        buildLegend();
        buildTimeline(allEvents);
        if (mapLoaded) {
            loadEventsToMap(allEvents);
            setBasemap(MIN_YEAR);
        }
        setYear(MIN_YEAR, false);
    })
    .catch(err => console.error('Timeline load failed:', err));

</script>
</body>
</html>
