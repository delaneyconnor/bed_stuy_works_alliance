<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bed Stuy Works Alliance</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #fff;
            color: #000;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .logo {
            width: 360px;
            max-width: 80vw;
            height: auto;
            display: block;
        }

        .visit-btn {
            display: inline-block;
            margin-top: 2.5rem;
            color: #fff;
            background: #000;
            text-decoration: none;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            padding: 0.75rem 2rem;
            border: none;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .visit-btn:hover {
            opacity: 0.75;
        }

        /* ── Modal ── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-card {
            background: #fff;
            border: 1px solid #000;
            padding: 3rem 2.5rem 2.5rem;
            max-width: 440px;
            width: 90%;
            text-align: center;
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 1rem;
            right: 1.25rem;
            background: none;
            border: none;
            font-size: 1.1rem;
            cursor: pointer;
            color: #aaa;
            line-height: 1;
        }

        .modal-close:hover {
            color: #000;
        }

        .modal-card h2 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 0.02em;
            margin-bottom: 1rem;
            color: #000;
        }

        .modal-card p {
            font-size: 0.95rem;
            line-height: 1.75;
            color: #444;
            margin-bottom: 0.5rem;
        }

        .modal-enter-btn {
            margin-top: 1.75rem;
            display: inline-block;
            background: #000;
            color: #fff;
            border: none;
            padding: 0.75rem 2rem;
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .modal-enter-btn:hover {
            opacity: 0.75;
        }

        .modal-botanical {
            margin: 0 auto 1.75rem;
            display: block;
        }
    </style>
</head>
<body>
    <img src="BSWA_logo.png" alt="Bed Stuy Works Alliance" class="logo">
    <button class="visit-btn" onclick="openHello()">Visit Site</button>

    <!-- Hello modal -->
    <div id="hello-modal" class="modal-overlay">
        <div class="modal-card">
            <button class="modal-close" onclick="closeHello()" aria-label="Close">✕</button>

            <!-- Botanical illustration: flower with roots -->
            <svg class="modal-botanical" xmlns="http://www.w3.org/2000/svg"
                 viewBox="0 0 120 148" width="88" height="108" aria-hidden="true">
                <!-- Roots -->
                <path d="M60 104 C54 111 43 116 35 130"
                      stroke="#8b6a3e" stroke-width="1.8" fill="none" stroke-linecap="round"/>
                <path d="M60 104 C66 111 75 117 82 130"
                      stroke="#8b6a3e" stroke-width="1.8" fill="none" stroke-linecap="round"/>
                <path d="M60 104 C60 114 59 123 58 136"
                      stroke="#8b6a3e" stroke-width="1.8" fill="none" stroke-linecap="round"/>
                <!-- Ground line -->
                <line x1="30" y1="104" x2="90" y2="104"
                      stroke="#c4aa80" stroke-width="1.2"/>
                <!-- Stem -->
                <path d="M60 102 C60 88 60 62 60 52"
                      stroke="#5a8a5a" stroke-width="2.2" fill="none" stroke-linecap="round"/>
                <!-- Leaf left -->
                <path d="M60 82 C53 74 41 72 37 78 C43 78 52 80 60 82Z"
                      fill="#6aaa6a"/>
                <!-- Leaf right -->
                <path d="M60 68 C67 60 80 59 82 66 C76 66 68 67 60 68Z"
                      fill="#6aaa6a"/>
                <!-- Petals — 6-petal flower, center at (60,42) -->
                <ellipse cx="60" cy="28" rx="6" ry="13" fill="#f4b8c4"
                         transform="rotate(0,   60, 42)"/>
                <ellipse cx="60" cy="28" rx="6" ry="13" fill="#f4b8c4"
                         transform="rotate(60,  60, 42)"/>
                <ellipse cx="60" cy="28" rx="6" ry="13" fill="#f4b8c4"
                         transform="rotate(120, 60, 42)"/>
                <ellipse cx="60" cy="28" rx="6" ry="13" fill="#f4b8c4"
                         transform="rotate(180, 60, 42)"/>
                <ellipse cx="60" cy="28" rx="6" ry="13" fill="#f4b8c4"
                         transform="rotate(240, 60, 42)"/>
                <ellipse cx="60" cy="28" rx="6" ry="13" fill="#f4b8c4"
                         transform="rotate(300, 60, 42)"/>
                <!-- Flower center -->
                <circle cx="60" cy="42" r="9" fill="#f9d45e"/>
                <circle cx="60" cy="42" r="5" fill="#e09020" opacity="0.65"/>
            </svg>

            <h2>Hello!</h2>
            <p>In Bed-Stuy, we say hi.</p>
            <p>This site is a place for neighbors to connect — to find resources, get involved, and strengthen our community together.</p>
            <button class="modal-enter-btn" onclick="enterSite()">Come on in &rarr;</button>
        </div>
    </div>

    <script>
        function openHello() {
            document.getElementById('hello-modal').classList.add('active');
        }
        function closeHello() {
            document.getElementById('hello-modal').classList.remove('active');
        }
        function enterSite() {
            window.location.href = 'site.html';
        }
        // Close on backdrop click
        document.getElementById('hello-modal').addEventListener('click', function(e) {
            if (e.target === this) closeHello();
        });
    </script>
</body>
</html>
