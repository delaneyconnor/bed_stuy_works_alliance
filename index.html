<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bed Stuy Works Alliance</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .logo {
            width: 360px;
            max-width: 80vw;
            height: auto;
            display: block;
        }

        nav {
            margin-top: 3rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        .visit-btn {
            display: inline-block;
            margin-top: 2.5rem;
            color: #000;
            background: #fff;
            text-decoration: none;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            padding: 0.75rem 2rem;
            transition: opacity 0.2s;
        }

        .visit-btn:hover {
            opacity: 0.85;
        }

        nav {
            margin-top: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            font-size: 0.9rem;
            letter-spacing: 0.05em;
            border-bottom: 1px solid rgba(255,255,255,0.3);
            padding-bottom: 2px;
            transition: border-color 0.2s;
        }

        nav a:hover {
            border-color: #fff;
        }
    </style>
</head>
<body>
    <img src="Bed-Stuy_Works_Alliance_Logo.png" alt="Bed Stuy Works Alliance" class="logo">
    <a href="site.html" class="visit-btn">Visit Site</a>
</body>
</html>
